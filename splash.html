<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="San Martín Aromas" />
  <title>San Martín Aromas</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="icon-192x192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    #splash img {
      width: min(75vw, 320px);
      height: auto;
      animation: pulso 2s ease-in-out infinite;
    }

    #splash h1 {
      color: #5ecfbf;
      font-family: 'Georgia', serif;
      font-size: clamp(1.4rem, 5vw, 2rem);
      margin-top: 24px;
      letter-spacing: 2px;
      text-align: center;
    }

    #splash .barra {
      margin-top: 36px;
      width: min(60vw, 260px);
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
    }

    #splash .progreso {
      height: 100%;
      background: linear-gradient(90deg, #3ab8a8, #5ecfbf);
      border-radius: 2px;
      animation: carga 3.8s linear forwards;
    }

    @keyframes carga {
      from { width: 0%; }
      to   { width: 100%; }
    }

    @keyframes pulso {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.04); }
    }

    #splash.oculto {
      opacity: 0;
      pointer-events: none;
    }

    #frame-container {
      position: fixed;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #frame-container.visible {
      opacity: 1;
    }

    #webview {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
