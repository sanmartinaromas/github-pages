                                                            onClick={() => {
                                                                if (CODIGOS_DESCUENTO[codigoDescuento.toUpperCase()]) {
                                                                    setDescuentoAplicado(true);
                                                                    showMsg(`¡${CODIGOS_DESCUENTO[codigoDescuento.toUpperCase()]}% de descuento aplicado!`);
                                                                } else {
                                                                    showMsg('Código inválido', 'error');
                                                                }
                                                            }}
                                                            className="bg-aroma-500 text-white px-5 py-3 rounded-2xl text-xs font-bold uppercase tracking-widest hover:bg-aroma-600 transition-all"
                                                        >Aplicar</button>
                                                    </div>
                                                )}
                                                {/* Descuento aplicado */}
                                                {descuento > 0 && (
                                                    <div className="flex justify-between text-sm font-bold text-green-600">
                                                        <span>Descuento ({porcentajeDescuento}%)</span>
                                                        <span>- {formatPrice(descuento)}</span>
                                                    </div>
                                                )}
                                                {/* Aviso mínimo revendedor */}
                                                {user?.tipo === 'revendedor' && cantidadTotal < minimoRevendedor && (
                                                    <div className="bg-amber-50 border border-amber-200 rounded-2xl px-4 py-3 text-xs font-bold text-amber-600 flex items-center gap-2">
                                                        <Icon name="alert-circle" className="w-4 h-4" />
                                                        Mínimo {minimoRevendedor} unidades para revendedor. Llevas {cantidadTotal}.
                                                    </div>
                                                )}
                                                {/* Ganancia revendedor total */}
                                                {user?.tipo === 'revendedor' && gananciaRevendedor > 0 && (
                                                    <div className="bg-green-50 border border-green-200 rounded-2xl px-4 py-3 flex justify-between items-center">
                                                        <div className="flex items-center gap-2 text-green-700 font-bold text-xs">
                                                            <Icon name="trending-up" className="w-4 h-4" />
                                                            Ganancia si vendés al público
                                                        </div>
                                                        <span className="text-green-700 font-black text-base">{formatPrice(gananciaRevendedor)}</span>
                                                    </div>
                                                )}
                                                <div className="flex justify-between items-end pt-4">
                                                    <span className="text-4xl font-black text-aroma-700 italic font-serif">{formatPrice(total)}</span>
                                                    <button onClick={finalizarPedidoTotal} disabled={cargandoEnvio || !puedeConfirmar} className={`px-10 py-5 rounded-[2rem] font-black uppercase text-[10px] tracking-widest shadow-xl transition-all ${puedeConfirmar ? 'bg-green-500 text-white hover:bg-green-600 shadow-green-100' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                                        {cargandoEnvio ? 'Enviando...' : 'Confirmar'}
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }
    </script>
</body>
</html>
