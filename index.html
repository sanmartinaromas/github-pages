                                {user ? (
                                    <div className="flex items-center gap-3">
                                        <span className="text-xs font-black text-aroma-600">{user.nombre.split(' ')[0]}</span>
                                        <button onClick={() => {setUser(null); setVista('inicio');}} className="text-slate-300 hover:text-red-400"><Icon name="log-out" className="w-4 h-4"/></button>
                                    </div>
                                ) : (
                                    <button onClick={() => setVista('login')} className="bg-aroma-500 text-white px-6 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-aroma-600 shadow-xl shadow-aroma-100">Ingresar</button>
                                )}
                            </nav>
                        </div>
                    </header>

                    {notif && (
                        <div className={`fixed bottom-5 left-1/2 -translate-x-1/2 z-[100] px-8 py-4 rounded-2xl shadow-2xl text-white text-sm font-bold animate-in flex items-center gap-3 ${notif.t === 'error' ? 'bg-red-500' : 'bg-aroma-600'}`}>
                            <Icon name={notif.t === 'error' ? 'alert-circle' : 'check-circle'} />
                            {notif.m}
                        </div>
                    )}

                    <main className="flex-grow p-6 max-w-6xl mx-auto w-full">
                        {vista === 'inicio' && (
                            <div className="animate-in space-y-12">
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
                                    {productos.map(p => (
                                        <div key={p.id} className="product-card bg-white rounded-[2.5rem] p-6 border border-slate-100 shadow-sm transition-all group">
                                            {p.image && (
                                                <div className="aspect-square rounded-3xl overflow-hidden mb-6 bg-slate-50 relative">
                                                    <img src={p.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                                </div>
                                            )}
                                            <h3 className="font-bold text-lg mb-2 text-slate-800">{p.name}</h3>
                                            <p className="text-xs text-slate-400 line-clamp-2 mb-4 leading-relaxed">{p.description}</p>
                                            <div className="flex justify-between items-center mt-4 pt-4 border-t border-slate-50">
                                                <span className="text-xl font-black text-aroma-600 italic">{formatPrice(p.price)}</span>
                                                <button onClick={() => { setCarrito([...carrito, {...p, cantidad: 1}]); showMsg("Añadido"); }} className="bg-aroma-50 text-aroma-500 p-3 rounded-xl hover:bg-aroma-500 hover:text-white transition-all"><Icon name="plus" /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {vista === 'admin' && adminAuth && (
                            <div className="animate-in space-y-8 pb-20">
                                <div className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm">
                                    <div className="flex flex-wrap gap-4 justify-between items-center mb-8">
                                        <div>
                                            <h2 className="text-3xl font-black italic font-serif text-slate-800 tracking-tight">Consola Central</h2>
                                            <div className="flex gap-4 mt-2">
                                                <button onClick={() => setTabAdmin('productos')} className={`text-[10px] font-black uppercase tracking-widest pb-1 border-b-2 transition-all ${tabAdmin === 'productos' ? 'border-aroma-500 text-aroma-600' : 'border-transparent text-slate-300'}`}>Inventario</button>
                                                <button onClick={() => setTabAdmin('usuarios')} className={`text-[10px] font-black uppercase tracking-widest pb-1 border-b-2 transition-all ${tabAdmin === 'usuarios' ? 'border-aroma-500 text-aroma-600' : 'border-transparent text-slate-300'}`}>Clientes</button>
                                            </div>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            <button onClick={handleExport} className="bg-slate-50 text-slate-500 px-5 py-3 rounded-2xl text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-slate-100">
                                                <Icon name="download" className="w-4 h-4" /> Exportar {tabAdmin === 'productos' ? 'Stock' : 'Clientes'}
                                            </button>
                                            <label className="bg-aroma-600 text-white px-5 py-3 rounded-2xl text-[10px] font-bold uppercase tracking-widest cursor-pointer shadow-lg shadow-aroma-100 flex items-center gap-2 hover:bg-aroma-700">
                                                <Icon name="upload" className="w-4 h-4" /> Cargar {tabAdmin === 'productos' ? 'Stock' : 'Clientes'}
                                                <input type="file" accept=".xlsx, .xls" onChange={handleFileUpload} className="hidden" />
                                            </label>
                                        </div>
                                    </div>
                                    
                                    <div className="overflow-x-auto rounded-3xl border border-slate-50">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 text-[10px] uppercase font-black text-slate-400 tracking-widest">
                                                <tr>
                                                    <th className="p-4">ID</th>
                                                    <th className="p-4">Información</th>
                                                    <th className="p-4">Detalle / Valor</th>
                                                    <th className="p-4 text-right">Acciones</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {(tabAdmin === 'productos' ? productos : usuarios).map((item) => (
                                                    <tr key={item.id} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-4 font-mono text-[10px] text-slate-300">#{item.id}</td>
                                                        <td className="p-4">
                                                            <p className="font-bold text-slate-700">{item.name || item.nombre}</p>
                                                            {item.email && <p className="text-[10px] text-slate-400">{item.email}</p>}
                                                        </td>
                                                        <td className="p-4 font-black text-aroma-600">
                                                            {tabAdmin === 'productos' 
                                                                ? formatPrice(item.price) 
                                                                : `${item.descuento.porcentaje}% (Desde ${item.descuento.cantidadMinima} u.)`}
                                                        </td>
                                                        <td className="p-4 text-right">
                                                            <button 
                                                                onClick={() => eliminarItem(item.id)}
                                                                className="text-slate-200 hover:text-red-400 transition-colors p-2"
                                                                title="Eliminar registro"
                                                            >
                                                                <Icon name="trash-2" className="w-4 h-4"/>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {(tabAdmin === 'productos' ? productos : usuarios).length === 0 && (
                                                    <tr>
                                                        <td colSpan="4" className="p-12 text-center text-slate-300 font-bold uppercase tracking-widest text-xs">
                                                            No hay registros cargados
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {vista === 'login' && (
                            <div className="max-w-sm mx-auto mt-20 animate-in">
                                <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-50 text-center relative">
                                    <div className="absolute -top-12 left-1/2 -translate-x-1/2 w-24 h-24 bg-white rounded-full p-4 shadow-xl border border-slate-50">
                                        <img src={LOGO_URL} className="w-full h-full object-contain" />
                                    </div>
                                    <h2 className="text-2xl font-black mt-8 mb-2">Portal Mayorista</h2>
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8">Ingresa tu correo habilitado</p>
                                    <input type="email" id="emailLogin" className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-center outline-none border-2 border-transparent focus:border-aroma-200 mb-4 transition-all" placeholder="ejemplo@correo.com" />
                                    <button onClick={() => {
                                        const email = document.getElementById('emailLogin').value.toLowerCase().trim();
                                        const found = usuarios.find(u => u.email.toLowerCase() === email);
                                        if(found) { setUser(found); setVista('inicio'); showMsg(`Hola, ${found.nombre}`); }
                                        else showMsg("Email no habilitado", "error");
                                    }} className="w-full bg-aroma-500 text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-xl shadow-aroma-100 hover:bg-aroma-600 transition-all">Ingresar</button>
                                </div>
                            </div>
                        )}

                        {vista === 'carrito' && (
                            <div className="max-w-2xl mx-auto animate-in space-y-8">
                                <h2 className="text-4xl font-black italic font-serif text-center text-slate-800">Tu Pedido</h2>
                                <div className="bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-50 relative">
                                    {carrito.length === 0 ? (
                                        <div className="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-[10px]">Vacío</div>
                                    ) : (
                                        <div className="space-y-6">
                                            {carrito.map((item, i) => (
                                                <div key={i} className="flex justify-between items-center border-b pb-4 border-slate-50">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-14 h-14 rounded-2xl bg-slate-50 overflow-hidden flex items-center justify-center">
                                                            {item.image ? <img src={item.image} className="w-full h-full object-cover"/> : <Icon name="package" className="w-6 h-6 text-slate-300"/>}
                                                        </div>
                                                        <div>
                                                            <p className="font-bold text-slate-700 text-sm">{item.name}</p>
                                                            <p className="text-[10px] text-slate-400 font-black">{formatPrice(item.price)} x {item.cantidad}</p>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => setCarrito(carrito.filter((_, idx) => idx !== i))} className="text-slate-200 hover:text-red-400"><Icon name="trash" className="w-4 h-4"/></button>
                                                </div>
                                            ))}
                                            <div className="pt-8 mt-8 border-t-2 border-slate-50 space-y-4">
                                                <div className="flex justify-between text-xs font-bold text-slate-400"><span>Subtotal</span><span>{formatPrice(subtotal)}</span></div>
                                                {descVal > 0 && (
                                                    <div className="flex justify-between text-aroma-600 font-black text-xs bg-aroma-50 p-4 rounded-2xl">
                                                        <span>Descuento Aplicado ({user.descuento.porcentaje}%)</span>
                                                        <span>-{formatPrice(descVal)}</span>
                                                    </div>
                                                )}
                                                <div className="flex justify-between items-end pt-4">
                                                    <span className="text-4xl font-black text-aroma-700 italic font-serif">{formatPrice(total)}</span>
                                                    <button onClick={finalizarPedidoTotal} disabled={cargandoEnvio} className="bg-green-500 text-white px-10 py-5 rounded-[2rem] font-black uppercase text-[10px] tracking-widest hover:bg-green-600 shadow-xl shadow-green-100">
                                                        {cargandoEnvio ? 'Enviando...' : 'Confirmar'}
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal Login Admin */}
                    {showAdminLogin && !adminAuth && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-xs shadow-2xl animate-in text-center border-b-8 border-aroma-500">
                                <h2 className="font-black mb-6 uppercase text-[10px] tracking-widest text-slate-400">Administrador</h2>
                                <input type="password" value={passInput} onChange={e => setPassInput(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl text-center mb-6 font-bold outline-none" placeholder="Clave" autoFocus />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowAdminLogin(false)} className="flex-1 text-[10px] font-black uppercase tracking-widest text-slate-300">Cerrar</button>
                                    <button onClick={() => {
                                        if(passInput === CLAVE_ADMIN) { setAdminAuth(true); setShowAdminLogin(false); setVista('admin'); setPassInput(""); }
                                        else showMsg("Clave incorrecta", "error");
                                    }} className="flex-1 bg-aroma-600 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Entrar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
