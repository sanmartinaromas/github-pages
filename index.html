                                    </div>
                                ) : (
                                    <button onClick={() => setVista('login')} className="bg-aroma-500 text-white px-6 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-aroma-600 shadow-xl shadow-aroma-100">Ingresar</button>
                                )}
                            </nav>
                        </div>
                    </header>

                    {notif && (
                        <div className={`fixed bottom-5 left-1/2 -translate-x-1/2 z-[100] px-8 py-4 rounded-2xl shadow-2xl text-white text-sm font-bold animate-in flex items-center gap-3 ${notif.t === 'error' ? 'bg-red-500' : 'bg-aroma-600'}`}>
                            <Icon name={notif.t === 'error' ? 'alert-circle' : 'check-circle'} />
                            {notif.m}
                        </div>
                    )}

                    <main className="flex-grow p-6 max-w-6xl mx-auto w-full">
                        {vista === 'inicio' && (
                            <div className="animate-in space-y-10">
                                {/* Hero */}
                                <div className="text-center py-10">
                                    <p className="text-[10px] font-black uppercase tracking-[.4em] text-aroma-400 mb-2">Catálogo Oficial</p>
                                    <h2 className="font-serif text-5xl font-bold italic text-slate-800 mb-1">San Martín Aromas</h2>
                                    <p className="text-slate-400 text-xs tracking-widest uppercase">Aromas & Fragancias</p>
                                </div>

                                {/* Banner vigencia lista de precios */}
                                <div className="flex items-center justify-center gap-3 bg-amber-50 border border-amber-200 rounded-2xl px-6 py-3">
                                    <Icon name="calendar" className="w-4 h-4 text-amber-500" />
                                    <p className="text-xs font-bold text-amber-700 uppercase tracking-widest">Lista de precios vigente: <span className="font-black">09 Abril — 07 Mayo 2026</span></p>
                                    <span className="hidden sm:flex items-center gap-1 bg-amber-500 text-white text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded-full">
                                        <Icon name="tag" className="w-3 h-3" /> Promos activas
                                    </span>
                                </div>

                                {/* Banner revendedor */}
                                {user?.tipo === 'revendedor' && (
                                    <div className="bg-aroma-50 border border-aroma-200 rounded-2xl px-6 py-3 text-xs font-bold text-aroma-600 flex items-center gap-2">
                                        <Icon name="tag" className="w-4 h-4" /> Mostrando precios de reventa
                                    </div>
                                )}

                                {/* Buscador */}
                                <div className="flex gap-3 max-w-xl mx-auto w-full">
                                    <div className="relative flex-1">
                                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none">
                                            <Icon name="search" className="w-5 h-5" />
                                        </div>
                                        <input
                                            type="text"
                                            value={busqueda}
                                            onChange={e => setBusqueda(e.target.value)}
                                            placeholder="Buscar producto..."
                                            className="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl shadow-sm outline-none focus:border-aroma-300 transition-all text-sm font-medium"
                                        />
                                        {busqueda && (
                                            <button onClick={() => setBusqueda('')} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500">
                                                <Icon name="x" className="w-4 h-4" />
                                            </button>
                                        )}
                                    </div>
                                    <button
                                        onClick={() => setVistaLista(v => !v)}
                                        className={`flex items-center gap-2 px-5 py-4 rounded-2xl border-2 font-bold transition-all flex-shrink-0 text-xs uppercase tracking-widest ${vistaLista ? 'bg-aroma-500 text-white border-aroma-500 shadow-lg shadow-aroma-100' : 'bg-white text-aroma-500 border-aroma-300 hover:bg-aroma-50'}`}
                                        title={vistaLista ? 'Vista grilla' : 'Vista lista'}
                                    >
                                        <Icon name={vistaLista ? 'layout-grid' : 'list'} className="w-4 h-4" />
                                        <span className="hidden sm:inline">{vistaLista ? 'Grilla' : 'Lista'}</span>
                                    </button>
                                </div>

                                {/* Menú de grupos — nivel 1 */}
                                {!busqueda && (
                                    <div className="space-y-3">
                                        <div className="flex flex-wrap gap-2 justify-center">
                                            <button
                                                onClick={() => { setGrupoActivo(null); setSubgrupoActivo(null); }}
                                                className={`flex items-center gap-2 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest transition-all border ${!grupoActivo ? 'bg-aroma-500 text-white border-aroma-500 shadow-lg shadow-aroma-100' : 'bg-white text-slate-400 border-slate-100 hover:border-aroma-200 hover:text-aroma-500'}`}
                                            >
                                                <Icon name="grid" className="w-3 h-3" /> Todos
                                            </button>
                                            {ORDEN_GRUPOS.filter(g => productos.some(p => p.grupo === g)).map(g => (
                                                <button
                                                    key={g}
                                                    onClick={() => { setGrupoActivo(g); setSubgrupoActivo(null); }}
                                                    className={`flex items-center gap-2 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest transition-all border ${grupoActivo === g ? 'bg-aroma-500 text-white border-aroma-500 shadow-lg shadow-aroma-100' : 'bg-white text-slate-400 border-slate-100 hover:border-aroma-200 hover:text-aroma-500'}`}
                                                >
                                                    <Icon name={ICONOS_GRUPO[g] || 'tag'} className="w-3 h-3" />
                                                    {g.replace('Línea ', '')}
                                                </button>
                                            ))}
                                        </div>

                                        {/* Nivel 2: subgrupos del grupo activo */}
                                        {grupoActivo && subgruposDelGrupo.length > 1 && (
                                            <div className="flex flex-wrap gap-2 justify-center pt-1">
                                                <button
                                                    onClick={() => setSubgrupoActivo(null)}
                                                    className={`px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all border ${!subgrupoActivo ? 'bg-aroma-600 text-white border-aroma-600' : 'bg-aroma-50 text-aroma-500 border-aroma-100 hover:bg-aroma-100'}`}
                                                >
                                                    Todo {grupoActivo.replace('Línea ', '')}
                                                </button>
                                                {subgruposDelGrupo.map(sg => (
                                                    <button
                                                        key={sg}
                                                        onClick={() => setSubgrupoActivo(sg)}
                                                        className={`px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all border ${subgrupoActivo === sg ? 'bg-aroma-600 text-white border-aroma-600' : 'bg-aroma-50 text-aroma-500 border-aroma-100 hover:bg-aroma-100'}`}
                                                    >
                                                        {sg}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* Resultados */}
                                {grupos.length === 0 && (
                                    <div className="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-xs">Sin resultados para "{busqueda}"</div>
                                )}

                                {grupos.map(({ grupo, items, subgrupos }) => (
                                    <div key={grupo} className="space-y-6">
                                        {/* Título de grupo */}
                                        <div className="flex items-center gap-4">
                                            <h3 className="font-extrabold text-lg uppercase tracking-widest text-aroma-600 whitespace-nowrap">{grupo}</h3>
                                            <div className="flex-1 h-px bg-aroma-100"></div>
                                            <span className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">{items.length} productos</span>
                                        </div>
                                        {/* Subgrupos */}
                                        {Object.entries(subgrupos).map(([sg, sgItems]) => (
                                            <div key={sg} className="space-y-3">
                                                <div className="flex items-center gap-3">
                                                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-400 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">{sg}</span>
                                                    <div className="flex-1 h-px bg-slate-50"></div>
                                                </div>
                                                <div className={vistaLista ? "flex flex-col gap-3" : "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"}>
                                                    {sgItems.map(p => {
                                                        const precio = getPrecio(p);
                                                        const promo = isPromo(p);
                                                        const vigencia = promoVigencia(p);
                                                        const precioPublico = PRECIOS_PUBLICO[p.id] || precio;
                                                        const gananciaItem = user?.tipo === 'revendedor' ? precioPublico - precio : 0;
                                                        const cleanName = p.name.replace('⭐ PROMO', '').trim();
                                                        if (vistaLista) {
                                                            return (
                                                                <div key={p.id} className={`flex items-center gap-4 bg-white rounded-2xl px-5 py-4 border shadow-sm transition-all hover:shadow-md ${promo ? 'border-amber-200 bg-amber-50/30' : 'border-slate-100'}`}>
                                                                    {p.image ? (
                                                                        <div className="w-14 h-14 rounded-xl overflow-hidden bg-slate-50 flex-shrink-0">
                                                                            <img src={p.image} loading="lazy" className="w-full h-full object-contain" />
                                                                        </div>
                                                                    ) : (
                                                                        <div className="w-14 h-14 rounded-xl bg-slate-50 flex items-center justify-center flex-shrink-0">
                                                                            <Icon name="package" className="w-6 h-6 text-slate-300" />
                                                                        </div>
                                                                    )}
                                                                    <div className="flex-1 min-w-0">
                                                                        <div className="flex items-center gap-2 flex-wrap">
                                                                            <h4 className="font-bold text-sm text-slate-800 leading-snug">{cleanName}</h4>
                                                                            {promo && <span className="bg-amber-500 text-white text-[9px] font-black uppercase tracking-widest px-2 py-0.5 rounded-full">PROMO</span>}
                                                                        </div>
                                                                        {vigencia && <p className="text-[10px] text-amber-600 font-bold mt-0.5">⏰ Válido hasta {vigencia}</p>}
                                                                        {user?.tipo === 'revendedor' && gananciaItem > 0 && (
                                                                            <p className="text-[10px] text-green-600 font-bold">Ganás {formatPrice(gananciaItem)} c/u</p>
                                                                        )}
                                                                    </div>
                                                                    <div className="flex items-center gap-3 flex-shrink-0">
                                                                        <span className={`text-base font-black italic ${promo ? 'text-amber-600' : 'text-aroma-600'}`}>{formatPrice(precio)}</span>
                                                                        <button onClick={() => addToCarrito(p, precio)} className="bg-aroma-50 text-aroma-500 p-2 rounded-xl hover:bg-aroma-500 hover:text-white transition-all"><Icon name="plus" className="w-4 h-4"/></button>
                                                                    </div>
                                                                </div>
                                                            );
                                                        }
                                                        return (
                                                            <div key={p.id} className={`product-card bg-white rounded-[2.5rem] p-6 border shadow-sm transition-all group relative ${promo ? 'border-amber-200' : 'border-slate-100'}`}>
                                                                {promo && (
                                                                    <div className="absolute top-4 right-4 z-10">
                                                                        <span className="bg-amber-500 text-white text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded-full shadow-lg">PROMO</span>
                                                                    </div>
                                                                )}
                                                                {p.image && (
                                                                    <div className={`aspect-square rounded-3xl overflow-hidden mb-6 relative ${promo ? 'bg-amber-50' : 'bg-slate-50'}`}>
                                                                        <img src={p.image} loading="lazy" className="w-full h-full object-contain group-hover:scale-105 transition-transform duration-700" />
                                                                    </div>
                                                                )}
                                                                <h4 className="font-bold text-base mb-1 text-slate-800 leading-snug">{cleanName}</h4>
                                                                <p className="text-xs text-slate-400 line-clamp-2 leading-relaxed">{p.description.replace(/\s*—\s*PROMO.*/i, '')}</p>
                                                                {vigencia && (
                                                                    <p className="text-[10px] text-amber-600 font-bold mt-1.5 flex items-center gap-1">
                                                                        <span>⏰</span> Válido hasta {vigencia}
                                                                    </p>
                                                                )}
                                                                {user?.tipo === 'revendedor' && gananciaItem > 0 && (
                                                                    <p className="text-[10px] text-green-600 font-bold mt-1 flex items-center gap-1">
                                                                        <span>💰</span> Ganás {formatPrice(gananciaItem)} c/u
                                                                    </p>
                                                                )}
                                                                <div className="flex justify-between items-center mt-4 pt-4 border-t border-slate-50">
                                                                    <div>
                                                                        {promo && precioPublico > precio && (
                                                                            <span className="text-xs text-slate-400 line-through block">{formatPrice(precioPublico)}</span>
                                                                        )}
                                                                        <span className={`text-xl font-black italic ${promo ? 'text-amber-600' : 'text-aroma-600'}`}>{formatPrice(precio)}</span>
                                                                    </div>
                                                                    <button onClick={() => addToCarrito(p, precio)} className={`p-3 rounded-xl transition-all ${promo ? 'bg-amber-50 text-amber-500 hover:bg-amber-500 hover:text-white' : 'bg-aroma-50 text-aroma-500 hover:bg-aroma-500 hover:text-white'}`}><Icon name="plus" /></button>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}

                        {vista === 'login' && (
                            <div className="max-w-sm mx-auto mt-20 animate-in">
                                <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-50 text-center relative">
                                    <div className="absolute -top-12 left-1/2 -translate-x-1/2 w-24 h-24 bg-white rounded-full p-4 shadow-xl border border-slate-50">
                                        <img src={LOGO_URL} className="w-full h-full object-contain" />
                                    </div>
                                    <h2 className="text-2xl font-black mt-8 mb-2">Portal Revendedor</h2>
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8">Ingresá tu correo habilitado</p>
                                    <input type="email" id="emailLogin" className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-center outline-none border-2 border-transparent focus:border-aroma-200 mb-4 transition-all" placeholder="ejemplo@correo.com" />
                                    <button onClick={() => {
                                        const email = document.getElementById('emailLogin').value.toLowerCase().trim();
                                        const found = usuarios.find(u => u.email.toLowerCase() === email);
                                        if(found) { setUser(found); setVista('inicio'); showMsg(`Hola, ${found.nombre}`); }
                                        else showMsg("Email no habilitado", "error");
                                    }} className="w-full bg-aroma-500 text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-xl shadow-aroma-100 hover:bg-aroma-600 transition-all mb-3">Ingresar como Revendedor</button>
                                    <button onClick={() => setVista('inicio')} className="text-xs text-slate-400 hover:text-aroma-500 font-bold uppercase tracking-widest">Volver al catálogo público</button>
                                </div>
                            </div>
                        )}

                        {vista === 'carrito' && (
                            <div className="max-w-2xl mx-auto animate-in space-y-8">
                                <h2 className="text-4xl font-black italic font-serif text-center text-slate-800">Tu Pedido</h2>
                                <div className="bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-50 relative">
                                    {carrito.length === 0 ? (
                                        <div className="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-[10px]">Vacío</div>
                                    ) : (
                                        <div className="space-y-4">
                                            {carrito.map((item, i) => {
                                                const precioPublico = PRECIOS_PUBLICO[item.id] || item.precioUsado;
                                                const gananciaItem = user?.tipo === 'revendedor' ? (precioPublico - item.precioUsado) * item.cantidad : 0;
                                                return (
                                                <div key={i} className="flex justify-between items-center border-b pb-4 border-slate-50">
                                                    <div className="flex items-center gap-4 flex-1 min-w-0">
                                                        <div className="w-14 h-14 rounded-2xl bg-slate-50 overflow-hidden flex items-center justify-center flex-shrink-0">
                                                            {item.image ? <img src={item.image} loading="lazy" className="w-full h-full object-cover"/> : <Icon name="package" className="w-6 h-6 text-slate-300"/>}
                                                        </div>
                                                        <div className="min-w-0">
                                                            <p className="font-bold text-slate-700 text-sm leading-snug truncate">{item.name.replace('⭐ PROMO','').trim()}</p>
                                                            <p className="text-[10px] text-slate-400 font-black">{formatPrice(item.precioUsado)} c/u</p>
                                                            {user?.tipo === 'revendedor' && gananciaItem > 0 && (
                                                                <p className="text-[10px] text-green-600 font-bold">💰 Ganás {formatPrice(gananciaItem)}</p>
                                                            )}
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-3 flex-shrink-0 ml-3">
                                                        <div className="flex items-center gap-1 bg-slate-50 rounded-xl p-1">
                                                            <button onClick={() => updateCantidad(i, -1)} className="w-7 h-7 flex items-center justify-center text-slate-400 hover:text-aroma-600 hover:bg-white rounded-lg transition-all font-black text-lg">−</button>
                                                            <span className="w-7 text-center text-sm font-black text-slate-700">{item.cantidad}</span>
                                                            <button onClick={() => updateCantidad(i, +1)} className="w-7 h-7 flex items-center justify-center text-slate-400 hover:text-aroma-600 hover:bg-white rounded-lg transition-all font-black text-lg">+</button>
                                                        </div>
                                                        <span className="text-sm font-black text-aroma-600 w-20 text-right">{formatPrice(item.precioUsado * item.cantidad)}</span>
                                                        <button onClick={() => setCarrito(carrito.filter((_, idx) => idx !== i))} className="text-slate-200 hover:text-red-400"><Icon name="trash" className="w-4 h-4"/></button>
                                                    </div>
                                                </div>
                                                );
                                            })}
                                            <div className="pt-8 mt-8 border-t-2 border-slate-50 space-y-4">
                                                {/* Campo código descuento — solo para público */}
                                                {(!user || user?.tipo !== 'revendedor') && (
                                                    <div className="flex gap-2">
                                                        <input
                                                            type="text"
                                                            value={codigoDescuento}
                                                            onChange={e => { setCodigoDescuento(e.target.value); setDescuentoAplicado(false); }}
                                                            placeholder="Código de descuento"
                                                            className="flex-1 px-4 py-3 bg-slate-50 rounded-2xl text-sm font-bold outline-none border-2 border-transparent focus:border-aroma-200 transition-all uppercase"
                                                        />
                                                        <button
                                                            onClick={() => {
                                                                if (CODIGOS_DESCUENTO[codigoDescuento.toUpperCase()]) {
                                                                    setDescuentoAplicado(true);
                                                                    showMsg(`¡${CODIGOS_DESCUENTO[codigoDescuento.toUpperCase()]}% de descuento aplicado!`);
                                                                } else {
                                                                    showMsg('Código inválido', 'error');
                                                                }
                                                            }}
                                                            className="bg-aroma-500 text-white px-5 py-3 rounded-2xl text-xs font-bold uppercase tracking-widest hover:bg-aroma-600 transition-all"
                                                        >Aplicar</button>
                                                    </div>
                                                )}
                                                {/* Descuento aplicado */}
                                                {descuento > 0 && (
                                                    <div className="flex justify-between text-sm font-bold text-green-600">
                                                        <span>Descuento ({porcentajeDescuento}%)</span>
                                                        <span>- {formatPrice(descuento)}</span>
                                                    </div>
                                                )}
                                                {/* Aviso mínimo revendedor */}
                                                {user?.tipo === 'revendedor' && cantidadTotal < minimoRevendedor && (
                                                    <div className="bg-amber-50 border border-amber-200 rounded-2xl px-4 py-3 text-xs font-bold text-amber-600 flex items-center gap-2">
                                                        <Icon name="alert-circle" className="w-4 h-4" />
                                                        Mínimo {minimoRevendedor} unidades para revendedor. Llevas {cantidadTotal}.
                                                    </div>
                                                )}
                                                {/* Ganancia revendedor total */}
                                                {user?.tipo === 'revendedor' && gananciaRevendedor > 0 && (
                                                    <div className="bg-green-50 border border-green-200 rounded-2xl px-4 py-3 flex justify-between items-center">
                                                        <div className="flex items-center gap-2 text-green-700 font-bold text-xs">
                                                            <Icon name="trending-up" className="w-4 h-4" />
                                                            Ganancia si vendés al público
                                                        </div>
                                                        <span className="text-green-700 font-black text-base">{formatPrice(gananciaRevendedor)}</span>
                                                    </div>
                                                )}
                                                <div className="flex justify-between items-end pt-4">
                                                    <span className="text-4xl font-black text-aroma-700 italic font-serif">{formatPrice(total)}</span>
                                                    <button onClick={finalizarPedidoTotal} disabled={cargandoEnvio || !puedeConfirmar} className={`px-10 py-5 rounded-[2rem] font-black uppercase text-[10px] tracking-widest shadow-xl transition-all ${puedeConfirmar ? 'bg-green-500 text-white hover:bg-green-600 shadow-green-100' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                                        {cargandoEnvio ? 'Enviando...' : 'Confirmar'}
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
