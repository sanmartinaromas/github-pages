                { id: 188, name: "Difusor Auto Manzana Verde 10ml",              price: 4395, stock: 10, image: "", description: "Línea Auto - Difusor para Auto 10ml" , grupo: "Línea Auto" },
                { id: 189, name: "Difusor Auto Piña Caribe 10ml",                price: 4395, stock: 10, image: "", description: "Línea Auto - Difusor para Auto 10ml" , grupo: "Línea Auto" },
                { id: 190, name: "Difusor Auto Polo Grey 10ml 🆕",               price: 4395, stock: 10, image: "", description: "Línea Auto - Difusor para Auto 10ml — NUEVO" , grupo: "Línea Auto" },
                { id: 191, name: "Difusor Auto Lavanda 10ml",                    price: 4395, stock: 10, image: "", description: "Línea Auto - Difusor para Auto 10ml" , grupo: "Línea Auto" },
                { id: 192, name: "Difusor Auto Verbena 10ml",                    price: 4395, stock: 10, image: "", description: "Línea Auto - Difusor para Auto 10ml" , grupo: "Línea Auto" },

                // LÍNEA AUTO — Aromatizador para Auto (120ml)
                { id: 193, name: "Aromatizador Auto Acqua Car 120ml",            price: 2225, stock: 10, image: "", description: "Línea Auto - Aromatizador para Auto 120ml" , grupo: "Línea Auto" },
                { id: 194, name: "Aromatizador Auto Candy 120ml 🆕",             price: 2225, stock: 10, image: "", description: "Línea Auto - Aromatizador para Auto 120ml — NUEVO" , grupo: "Línea Auto" },
                { id: 195, name: "Aromatizador Auto Manzana Verde 120ml",        price: 2225, stock: 10, image: "", description: "Línea Auto - Aromatizador para Auto 120ml" , grupo: "Línea Auto" },
                { id: 196, name: "Aromatizador Auto Piña Caribe 120ml",          price: 2225, stock: 10, image: "", description: "Línea Auto - Aromatizador para Auto 120ml" , grupo: "Línea Auto" },
                { id: 197, name: "Aromatizador Auto Polo Grey 120ml 🆕",         price: 2225, stock: 10, image: "", description: "Línea Auto - Aromatizador para Auto 120ml — NUEVO" , grupo: "Línea Auto" },

                // LÍNEA SALUD
                { id: 198, name: "Alcohol en Gel Acqua 500ml",                   price: 1970, stock: 10, image: "", description: "Línea Salud - Alcohol en Gel 500ml" , grupo: "Línea Salud" },

                // OTROS PRODUCTOS — Home Spray (250ml)
                { id: 199, name: "Home Spray Gardenia & Flores Blancas 250ml",   price: 4675, stock: 10, image: "", description: "Otros Productos - Home Spray 250ml" , grupo: "Otros Productos" },
                { id: 200, name: "Home Spray Orquídea & Flor de Loto 250ml",     price: 4675, stock: 10, image: "", description: "Otros Productos - Home Spray 250ml" , grupo: "Otros Productos" },
                { id: 201, name: "Home Spray Amapola & Rosas 250ml",             price: 4675, stock: 10, image: "", description: "Otros Productos - Home Spray 250ml" , grupo: "Otros Productos" },

                // ACCESORIOS
                { id: 202, name: "Ambientador Analógico",                        price: 16715, stock: 10, image: "", description: "Accesorios" , grupo: "Otros Productos" },
                { id: 203, name: "Ambientador Analógico 220V",                   price: 20360, stock: 10, image: "", description: "Accesorios" , grupo: "Otros Productos" },
                { id: 204, name: "Cubo Difusor",                                 price: 3965,  stock: 10, image: "", description: "Accesorios" , grupo: "Otros Productos" },

                // COMPLEMENTOS
                { id: 205, name: "Bomba Cremera",                                price: 1030,  stock: 10, image: "", description: "Complementos" , grupo: "Otros Productos" },
                { id: 206, name: "Gatillo",                                      price: 750,   stock: 10, image: "", description: "Complementos" , grupo: "Otros Productos" },
            ]);

            // Estado de Usuarios
            const [usuarios] = useState([
                { id: "u1", nombre: "Distribuidora Mendoza", email: "mayorista@test.com", tipo: "revendedor" },
                { id: "u2", nombre: "Revendedor", email: "revendedor@ejemplo.com", tipo: "revendedor" }
            ]);

            const [carrito, setCarrito] = useState([]);
            const [user, setUser] = useState(null);
            const [notif, setNotif] = useState(null);
            const [busqueda, setBusqueda] = useState('');

            const showMsg = (m, t = 'success') => { setNotif({ m, t }); setTimeout(() => setNotif(null), 3000); };
            const formatPrice = (p) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(p);

            // Precio según rol
            const getPrecio = (p) => (user?.tipo === 'revendedor') ? p.price : (PRECIOS_PUBLICO[p.id] || p.price);

            // Filtro y agrupado
            const ORDEN_GRUPOS = ["Línea Hogar","Línea Bebé","Línea Infantil","Línea Cuerpo","Línea Perfume","Línea Auto","Línea Salud","Otros Productos"];
            const productosFiltrados = productos.filter(p => p.name.toLowerCase().includes(busqueda.toLowerCase()) || p.description.toLowerCase().includes(busqueda.toLowerCase()));
            const grupos = ORDEN_GRUPOS.map(g => ({ grupo: g, items: productosFiltrados.filter(p => p.grupo === g) })).filter(g => g.items.length > 0);

            // Lógica Carrito
            const subtotal = carrito.reduce((t, i) => t + (i.precioUsado * i.cantidad), 0);
            const total = subtotal;

            const finalizarPedidoTotal = async () => {
                setCargandoEnvio(true);
                const nombreCliente = user ? user.nombre : "Cliente público";
                const emailCliente = user ? user.email : "—";
                let msgWhatsApp = `🌿 *PEDIDO SAN MARTÍN AROMAS*\n👤 *Cliente:* ${nombreCliente}\n---\n`;
                const detalleTexto = carrito.map(i => `• ${i.name} (x${i.cantidad}) - ${formatPrice(i.precioUsado * i.cantidad)}`).join('\n');
                msgWhatsApp += detalleTexto;
                msgWhatsApp += `\n---\n*TOTAL: ${formatPrice(total)}*\n---\n`;
                msgWhatsApp += `*Alias*: sanmartinaromas \n---\n *Titular*: Pacifico Humberto Montaldi`;

                try {
                    await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({
                            cliente: nombreCliente,
                            email: emailCliente,
                            pedido: detalleTexto,
                            total_pedido: formatPrice(total),
                            _subject: `Nuevo Pedido: ${nombreCliente}`
                        })
                    });
                } catch (error) { console.error(error); }

                window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msgWhatsApp)}`, '_blank');
                setCarrito([]);
                setVista('inicio');
                setCargandoEnvio(false);
                showMsg("Pedido enviado");
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="glass-header border-b sticky top-0 z-50 p-4">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4 cursor-pointer" onClick={() => setVista('inicio')}>
                                <img src={LOGO_URL} className="w-12 h-12 object-contain" />
                                <div>
                                    <h1 className="hidden sm:block font-extrabold text-aroma-600 uppercase tracking-tighter leading-none">San Martín Aromas</h1>
                                    <span className="hidden sm:block text-[8px] tracking-[.3em] uppercase opacity-40 text-slate-500 font-normal">Aromas & Fragancias</span>
                                </div>
                            </div>
                            <nav className="flex gap-6 items-center">
                                <button onClick={() => setVista('inicio')} className="text-xs font-black uppercase tracking-widest text-slate-400 hover:text-aroma-500 transition-colors">Catálogo</button>
                                <button onClick={() => setVista('carrito')} className="relative p-2 text-slate-400 hover:text-aroma-500 transition-colors">
                                    <Icon name="shopping-bag" />
                                    {carrito.length > 0 && <span className="absolute -top-1 -right-1 bg-aroma-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{carrito.length}</span>}
                                </button>
                                {user ? (
                                    <div className="flex items-center gap-3">
                                        <span className="text-xs font-black text-aroma-600">{user.nombre.split(' ')[0]}</span>
                                        <button onClick={() => { setUser(null); setVista('inicio'); showMsg("Sesión cerrada"); }} className="text-slate-300 hover:text-red-400"><Icon name="log-out" className="w-4 h-4"/></button>
                                    </div>
                                ) : (
                                    <button onClick={() => setVista('login')} className="bg-aroma-500 text-white px-6 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-aroma-600 shadow-xl shadow-aroma-100">Ingresar</button>
                                )}
                            </nav>
                        </div>
                    </header>

                    {notif && (
                        <div className={`fixed bottom-5 left-1/2 -translate-x-1/2 z-[100] px-8 py-4 rounded-2xl shadow-2xl text-white text-sm font-bold animate-in flex items-center gap-3 ${notif.t === 'error' ? 'bg-red-500' : 'bg-aroma-600'}`}>
                            <Icon name={notif.t === 'error' ? 'alert-circle' : 'check-circle'} />
                            {notif.m}
                        </div>
                    )}

                    <main className="flex-grow p-6 max-w-6xl mx-auto w-full">
                        {vista === 'inicio' && (
                            <div className="animate-in space-y-10">
                                {/* Hero */}
                                <div className="text-center py-10">
                                    <p className="text-[10px] font-black uppercase tracking-[.4em] text-aroma-400 mb-2">Catálogo Oficial</p>
                                    <h2 className="font-serif text-5xl font-bold italic text-slate-800 mb-1">San Martín Aromas</h2>
                                    <p className="text-slate-400 text-xs tracking-widest uppercase">Aromas & Fragancias</p>
                                </div>

                                {/* Banner revendedor */}
                                {user?.tipo === 'revendedor' && (
                                    <div className="bg-aroma-50 border border-aroma-200 rounded-2xl px-6 py-3 text-xs font-bold text-aroma-600 flex items-center gap-2">
                                        <Icon name="tag" className="w-4 h-4" /> Mostrando precios de reventa
                                    </div>
                                )}

                                {/* Buscador */}
                                <div className="relative max-w-xl mx-auto">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none">
                                        <Icon name="search" className="w-5 h-5" />
                                    </div>
                                    <input
                                        type="text"
                                        value={busqueda}
                                        onChange={e => setBusqueda(e.target.value)}
                                        placeholder="Buscar producto..."
                                        className="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl shadow-sm outline-none focus:border-aroma-300 transition-all text-sm font-medium"
                                    />
                                    {busqueda && (
                                        <button onClick={() => setBusqueda('')} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500">
                                            <Icon name="x" className="w-4 h-4" />
                                        </button>
                                    )}
                                </div>

                                {/* Resultados */}
                                {grupos.length === 0 && (
                                    <div className="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-xs">Sin resultados para "{busqueda}"</div>
                                )}

                                {grupos.map(({ grupo, items }) => (
                                    <div key={grupo} className="space-y-4">
                                        {/* Título de grupo */}
                                        <div className="flex items-center gap-4">
                                            <h3 className="font-extrabold text-lg uppercase tracking-widest text-aroma-600 whitespace-nowrap">{grupo}</h3>
                                            <div className="flex-1 h-px bg-aroma-100"></div>
                                            <span className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">{items.length} productos</span>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                                            {items.map(p => {
                                                const precio = getPrecio(p);
                                                return (
                                                    <div key={p.id} className="product-card bg-white rounded-[2.5rem] p-6 border border-slate-100 shadow-sm transition-all group">
                                                        {p.image && (
                                                            <div className="aspect-square rounded-3xl overflow-hidden mb-6 bg-slate-50 relative">
                                                                <img src={p.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                                            </div>
                                                        )}
                                                        <h4 className="font-bold text-base mb-1 text-slate-800 leading-snug">{p.name}</h4>
                                                        <p className="text-xs text-slate-400 line-clamp-2 mb-4 leading-relaxed">{p.description}</p>
                                                        <div className="flex justify-between items-center mt-4 pt-4 border-t border-slate-50">
                                                            <span className="text-xl font-black text-aroma-600 italic">{formatPrice(precio)}</span>
                                                            <button onClick={() => { setCarrito([...carrito, {...p, precioUsado: precio, cantidad: 1}]); showMsg("Añadido"); }} className="bg-aroma-50 text-aroma-500 p-3 rounded-xl hover:bg-aroma-500 hover:text-white transition-all"><Icon name="plus" /></button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {vista === 'login' && (
                            <div className="max-w-sm mx-auto mt-20 animate-in">
                                <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-50 text-center relative">
                                    <div className="absolute -top-12 left-1/2 -translate-x-1/2 w-24 h-24 bg-white rounded-full p-4 shadow-xl border border-slate-50">
                                        <img src={LOGO_URL} className="w-full h-full object-contain" />
                                    </div>
                                    <h2 className="text-2xl font-black mt-8 mb-2">Portal Revendedor</h2>
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8">Ingresá tu correo habilitado</p>
                                    <input type="email" id="emailLogin" className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-center outline-none border-2 border-transparent focus:border-aroma-200 mb-4 transition-all" placeholder="ejemplo@correo.com" />
                                    <button onClick={() => {
                                        const email = document.getElementById('emailLogin').value.toLowerCase().trim();
                                        const found = usuarios.find(u => u.email.toLowerCase() === email);
                                        if(found) { setUser(found); setVista('inicio'); showMsg(`Hola, ${found.nombre}`); }
                                        else showMsg("Email no habilitado", "error");
                                    }} className="w-full bg-aroma-500 text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-xl shadow-aroma-100 hover:bg-aroma-600 transition-all mb-3">Ingresar como Revendedor</button>
                                    <button onClick={() => setVista('inicio')} className="text-xs text-slate-400 hover:text-aroma-500 font-bold uppercase tracking-widest">Volver al catálogo público</button>
                                </div>
                            </div>
                        )}

                        {vista === 'carrito' && (
                            <div className="max-w-2xl mx-auto animate-in space-y-8">
                                <h2 className="text-4xl font-black italic font-serif text-center text-slate-800">Tu Pedido</h2>
                                <div className="bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-50 relative">
                                    {carrito.length === 0 ? (
                                        <div className="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-[10px]">Vacío</div>
                                    ) : (
                                        <div className="space-y-6">
                                            {carrito.map((item, i) => (
                                                <div key={i} className="flex justify-between items-center border-b pb-4 border-slate-50">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-14 h-14 rounded-2xl bg-slate-50 overflow-hidden flex items-center justify-center">
                                                            {item.image ? <img src={item.image} className="w-full h-full object-cover"/> : <Icon name="package" className="w-6 h-6 text-slate-300"/>}
                                                        </div>
                                                        <div>
                                                            <p className="font-bold text-slate-700 text-sm">{item.name}</p>
                                                            <p className="text-[10px] text-slate-400 font-black">{formatPrice(item.precioUsado)} x {item.cantidad}</p>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => setCarrito(carrito.filter((_, idx) => idx !== i))} className="text-slate-200 hover:text-red-400"><Icon name="trash" className="w-4 h-4"/></button>
                                                </div>
                                            ))}
                                            <div className="pt-8 mt-8 border-t-2 border-slate-50 space-y-4">
                                                <div className="flex justify-between items-end pt-4">
                                                    <span className="text-4xl font-black text-aroma-700 italic font-serif">{formatPrice(total)}</span>
                                                    <button onClick={finalizarPedidoTotal} disabled={cargandoEnvio} className="bg-green-500 text-white px-10 py-5 rounded-[2rem] font-black uppercase text-[10px] tracking-widest hover:bg-green-600 shadow-xl shadow-green-100">
                                                        {cargandoEnvio ? 'Enviando...' : 'Confirmar'}
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
