<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Martin Aromas - Tienda Oficial</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        aroma: {
                            50: '#f0f9f9',
                            100: '#d9f0ef',
                            200: '#b5e1de',
                            300: '#84c9c4',
                            400: '#58aaa5', 
                            500: '#3e8e89',
                            600: '#31726f',
                            700: '#2b5d5b',
                            800: '#264b4a',
                            900: '#233f3e',
                        },
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fafcfc;
            color: #264b4a;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        
        .loader { 
            border: 3px solid #f3f3f3; 
            border-top: 3px solid #58aaa5; 
            border-radius: 50%; 
            width: 20px; 
            height: 20px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #b5e1de; border-radius: 10px; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -15px rgba(88, 170, 165, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const getDriveImageUrl = (url) => {
            if (url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0];
                return `https://lh3.googleusercontent.com/d/${id}`;
            }
            return url;
        };

        // URL del Logo y Configuración General
        const LOGO_URL = getDriveImageUrl("https://drive.google.com/file/d/14d7ZtlSz-x6WwwDtHf6ks_nVCxYstwd1/view?usp=drive_link");
        const CLAVE_ADMIN_CORRECTA = "Hola4088";
        const WHATSAPP_DESTINO = "5492634733777"; 

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    iconElement.className = className;
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons();
                }
            }, [name, className]);
            return <div ref={iconRef} className="inline-flex items-center justify-center pointer-events-none" />;
        };

        const PRODUCTOS_INICIALES = [
            { id: 1, name: "Difusor de Varillas Premium", price: 4500, stock: 20, image: "https://images.unsplash.com/photo-1602928321679-560bb453f190?w=500", description: "Esencias seleccionadas para aromatizar tus ambientes con elegancia." },
            { id: 2, name: "Home Spray Textil", price: 3200, stock: 15, image: "https://images.unsplash.com/photo-1595981267035-7b04ca84a82d?w=500", description: "Fragancia de alta persistencia para sábanas y cortinas." },
            { id: 3, name: "Vela de Soja Artesanal", price: 2800, stock: 30, image: "https://images.unsplash.com/photo-1602872030219-c12009f48821?w=500", description: "Ecológicas, con pabilo de algodón y aromas relajantes." }
        ];

        const USUARIOS_INICIALES = [
            { id: "u1", nombre: "Distribuidora Mendoza", email: "mayorista@test.com", descuento: { cantidadMinima: 10, porcentaje: 20 } }
        ];

        function App() {
            const [vistaActual, setVistaActual] = useState('inicio'); 
            const [productos, setProductos] = useState(PRODUCTOS_INICIALES);
            const [usuarios, setUsuarios] = useState(USUARIOS_INICIALES);
            const [carrito, setCarrito] = useState([]);
            const [usuarioLogueado, setUsuarioLogueado] = useState(null);
            const [notificacion, setNotificacion] = useState(null);
            const [procesando, setProcesando] = useState(false);
            const [emailLogin, setEmailLogin] = useState("");
            
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [showAdminLogin, setShowAdminLogin] = useState(false);
            const [adminPassInput, setAdminPassInput] = useState("");
            const [tabAdmin, setTabAdmin] = useState('productos');

            const [nuevoProd, setNuevoProd] = useState({ name: '', price: '', stock: '', description: '', image: '' });
            const [nuevoUser, setNuevoUser] = useState({ nombre: '', email: '', minCant: 5, porcentaje: 15 });

            const mostrarNotificacion = (mensaje, tipo = 'success') => {
                setNotificacion({ mensaje, tipo });
                setTimeout(() => setNotificacion(null), 3500);
            };

            const formatearPrecio = (precio) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(precio);

            const totalUnidades = carrito.reduce((t, i) => t + i.cantidad, 0);
            const subtotal = carrito.reduce((t, i) => t + (i.price * i.cantidad), 0);
            let descuentoAplicado = 0;
            if (usuarioLogueado?.descuento && totalUnidades >= usuarioLogueado.descuento.cantidadMinima) {
                descuentoAplicado = subtotal * (usuarioLogueado.descuento.porcentaje / 100);
            }
            const totalFinal = subtotal - descuentoAplicado;

            const handleAdminAccess = (e) => {
                e.preventDefault();
                if(adminPassInput === CLAVE_ADMIN_CORRECTA) {
                    setIsAdminAuthenticated(true);
                    setShowAdminLogin(false);
                    setVistaActual('admin');
                } else { 
                    mostrarNotificacion("Contraseña incorrecta", "error"); 
                }
            };

            const procesarCompraFinal = async () => {
                if(!usuarioLogueado) { 
                    mostrarNotificacion("Inicia sesión para aplicar tus descuentos", "error");
                    setVistaActual('login'); 
                    return; 
                }
                setProcesando(true);
                const idOrder = Math.random().toString(36).substr(2, 5).toUpperCase();
                let detalleMsg = `🌿 *PEDIDO SAN MARTIN AROMAS*\n*Orden: #${idOrder}*\n👤 *Cliente:* ${usuarioLogueado.nombre}\n--------------------------\n`;
                carrito.forEach(item => { detalleMsg += `• ${item.name} (x${item.cantidad})\n`; });
                if(descuentoAplicado > 0) {
                    detalleMsg += `--------------------------\nSubtotal: ${formatearPrecio(subtotal)}\nDescuento (${usuarioLogueado.descuento.porcentaje}%): -${formatearPrecio(descuentoAplicado)}\n`;
                }
                detalleMsg += `--------------------------\n*TOTAL: ${formatearPrecio(totalFinal)}*`;
                
                const urlWa = `https://wa.me/${WHATSAPP_DESTINO}?text=${encodeURIComponent(detalleMsg)}`;
                window.open(urlWa, '_blank');
                
                setCarrito([]);
                setProcesando(false);
                setVistaActual('inicio');
                mostrarNotificacion("¡Pedido enviado por WhatsApp!");
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Principal */}
                    <header className="glass-header border-b border-aroma-100 sticky top-0 z-50 px-4 py-3">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4 cursor-pointer group" onClick={() => setShowAdminLogin(true)}>
                                <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center p-1.5 border border-aroma-100 shadow-sm overflow-hidden group-hover:shadow-md transition-all">
                                    <img src={LOGO_URL} alt="San Martin Aromas" className="w-full h-full object-contain" onError={(e) => e.target.src = 'https://via.placeholder.com/100?text=SM'} />
                                </div>
                                <div className="hidden sm:block">
                                    <h1 className="text-aroma-800 font-extrabold leading-none text-lg tracking-tight">San Martín</h1>
                                    <p className="text-aroma-400 font-bold text-[10px] tracking-[0.3em] uppercase mt-1">Aromas</p>
                                </div>
                            </div>
                            
                            <nav className="flex items-center gap-3 md:gap-8">
                                <button onClick={() => setVistaActual('inicio')} className={`text-[11px] font-bold uppercase tracking-widest transition-all ${vistaActual === 'inicio' ? 'text-aroma-600 border-b-2 border-aroma-400' : 'text-slate-400 hover:text-aroma-400'}`}>Tienda</button>
                                <button onClick={() => setVistaActual('carrito')} className="relative p-2.5 rounded-xl hover:bg-aroma-50 transition-colors">
                                    <Icon name="shopping-bag" className={`${carrito.length > 0 ? 'text-aroma-500' : 'text-slate-400'}`} />
                                    {carrito.length > 0 && (
                                        <span className="absolute -top-1 -right-1 bg-aroma-500 text-white text-[9px] w-5 h-5 rounded-full flex items-center justify-center font-bold shadow-sm">
                                            {carrito.length}
                                        </span>
                                    )}
                                </button>
                                {usuarioLogueado ? (
                                    <button onClick={() => setVistaActual('perfil')} className="bg-aroma-50 text-aroma-700 px-5 py-2 rounded-full text-[11px] font-bold border border-aroma-100 flex items-center gap-2 hover:bg-aroma-100 transition-colors">
                                        <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                        {usuarioLogueado.nombre.split(' ')[0]}
                                    </button>
                                ) : (
                                    <button onClick={() => setVistaActual('login')} className="bg-aroma-400 text-white px-6 py-2.5 rounded-full text-[11px] font-bold uppercase tracking-widest shadow-lg shadow-aroma-100 hover:bg-aroma-500 hover:-translate-y-0.5 transition-all active:scale-95">Ingresar</button>
                                )}
                            </nav>
                        </div>
                    </header>

                    {/* Notificaciones */}
                    {notificacion && (
                        <div className={`fixed bottom-8 right-8 z-[100] px-8 py-5 rounded-3xl shadow-2xl text-white font-bold animate-in flex items-center gap-4 ${notificacion.tipo === 'error' ? 'bg-rose-500' : 'bg-aroma-500'}`}>
                            <Icon name={notificacion.tipo === 'error' ? 'alert-circle' : 'check-circle'} className="w-6 h-6" />
                            <span className="text-sm tracking-wide">{notificacion.mensaje}</span>
                        </div>
                    )}

                    {/* Login Admin */}
                    {showAdminLogin && !isAdminAuthenticated && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl animate-in text-center">
                                <img src={LOGO_URL} alt="Admin" className="w-20 h-20 mx-auto mb-6 object-contain" />
                                <h2 className="text-aroma-800 font-bold mb-8 uppercase text-xs tracking-[0.4em]">Panel Administrativo</h2>
                                <form onSubmit={handleAdminAccess} className="space-y-6">
                                    <input type="password" value={adminPassInput} onChange={e => setAdminPassInput(e.target.value)} className="w-full bg-slate-50 p-5 rounded-2xl text-center font-bold outline-none border-2 border-transparent focus:border-aroma-200 transition-all" placeholder="Contraseña" autoFocus />
                                    <div className="flex gap-4">
                                        <button type="button" onClick={() => setShowAdminLogin(false)} className="flex-1 text-slate-400 py-4 font-bold text-[11px] uppercase tracking-widest">Cerrar</button>
                                        <button type="submit" className="flex-1 bg-aroma-500 text-white py-4 rounded-2xl font-bold text-[11px] uppercase shadow-xl shadow-aroma-100">Entrar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <main className="flex-grow p-6 max-w-6xl mx-auto w-full">
                        {/* Vista Principal / Catálogo */}
                        {vistaActual === 'inicio' && (
                            <div className="space-y-16 animate-in">
                                <section className="relative rounded-[4rem] overflow-hidden bg-white border border-aroma-100 p-10 md:p-20 flex flex-col md:flex-row items-center gap-12 shadow-sm">
                                    <div className="relative z-10 text-center md:text-left flex-1">
                                        <span className="bg-aroma-50 text-aroma-500 px-5 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-widest border border-aroma-100 inline-block mb-8">Nueva Colección</span>
                                        <h2 className="text-5xl md:text-7xl font-serif text-aroma-800 leading-[1.1] italic">El arte de <br/><span className="text-aroma-400 not-italic font-sans font-extrabold uppercase tracking-tighter">sentir</span></h2>
                                        <p className="text-slate-500 mt-8 text-sm md:text-lg font-medium leading-relaxed max-w-md">Fragancias artesanales diseñadas para transformar tus espacios en refugios de calma y bienestar.</p>
                                        <button onClick={() => document.getElementById('catalogo').scrollIntoView({ behavior: 'smooth' })} className="mt-10 bg-aroma-500 text-white px-10 py-5 rounded-full font-bold uppercase text-[11px] tracking-widest shadow-2xl shadow-aroma-100 hover:scale-105 transition-all">Explorar Productos</button>
                                    </div>
                                    <div className="flex-1 flex justify-center">
                                         <div className="w-64 h-64 md:w-96 md:h-96 relative">
                                            <div className="absolute inset-0 bg-aroma-50 rounded-full scale-110 blur-3xl opacity-50"></div>
                                            <img src={LOGO_URL} className="relative w-full h-full object-contain filter drop-shadow-2xl animate-pulse" style={{animationDuration: '4s'}} />
                                         </div>
                                    </div>
                                </section>

                                <div id="catalogo" className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                    {productos.map(p => (
                                        <div key={p.id} className="product-card bg-white rounded-[3rem] p-8 border border-slate-50 shadow-sm transition-all duration-500 group flex flex-col">
                                            <div className="aspect-[4/5] rounded-[2.5rem] overflow-hidden mb-8 bg-slate-50 border border-slate-100">
                                                <img src={p.image} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" alt={p.name} />
                                            </div>
                                            <div className="px-2">
                                                <h3 className="font-extrabold text-aroma-800 text-xl mb-3">{p.name}</h3>
                                                <p className="text-slate-400 text-sm mb-8 leading-relaxed h-10 overflow-hidden">{p.description}</p>
                                                <div className="flex justify-between items-center pt-4 border-t border-slate-50">
                                                    <div>
                                                        <span className="text-2xl font-black text-aroma-500">{formatearPrecio(p.price)}</span>
                                                    </div>
                                                    <button 
                                                        onClick={() => { setCarrito([...carrito, {...p, cantidad: 1}]); mostrarNotificacion(`${p.name} añadido`); }} 
                                                        className="bg-aroma-50 text-aroma-500 p-4 rounded-2xl hover:bg-aroma-500 hover:text-white transition-all active:scale-90"
                                                    >
                                                        <Icon name="shopping-cart" className="w-5 h-5" />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Panel Administrativo */}
                        {vistaActual === 'admin' && isAdminAuthenticated && (
                            <div className="animate-in space-y-10">
                                <header className="bg-white p-8 rounded-[3rem] border border-aroma-100 shadow-sm flex flex-col md:flex-row justify-between items-center gap-6">
                                    <div className="flex items-center gap-5">
                                        <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center border border-aroma-100 p-2 shadow-inner">
                                            <img src={LOGO_URL} className="w-full h-full object-contain" />
                                        </div>
                                        <div>
                                            <h2 className="text-aroma-800 font-extrabold text-xl tracking-tight">Gestión del Negocio</h2>
                                            <p className="text-[10px] text-aroma-400 font-bold uppercase tracking-[0.3em]">Modo Administrador</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => setVistaActual('inicio')} className="text-slate-400 px-6 py-2 font-bold text-[11px] uppercase tracking-widest hover:text-aroma-400">Ver Tienda</button>
                                        <button onClick={() => { setIsAdminAuthenticated(false); setVistaActual('inicio'); }} className="bg-rose-50 text-rose-500 px-8 py-3.5 rounded-2xl font-bold text-[11px] uppercase tracking-widest border border-rose-100">Cerrar Sesión</button>
                                    </div>
                                </header>

                                <div className="flex gap-12 border-b border-slate-100 mb-12">
                                    <button onClick={() => setTabAdmin('productos')} className={`pb-5 font-bold text-[11px] uppercase tracking-[0.2em] transition-all relative ${tabAdmin === 'productos' ? 'text-aroma-500 after:absolute after:bottom-[-1px] after:left-0 after:w-full after:h-1 after:bg-aroma-500 after:rounded-full' : 'text-slate-300'}`}>Inventario</button>
                                    <button onClick={() => setTabAdmin('usuarios')} className={`pb-5 font-bold text-[11px] uppercase tracking-[0.2em] transition-all relative ${tabAdmin === 'usuarios' ? 'text-aroma-500 after:absolute after:bottom-[-1px] after:left-0 after:w-full after:h-1 after:bg-aroma-500 after:rounded-full' : 'text-slate-300'}`}>Clientes Mayoristas</button>
                                </div>

                                {tabAdmin === 'productos' ? (
                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
                                        <div className="lg:col-span-4 bg-white p-10 rounded-[3.5rem] border border-aroma-50 shadow-sm h-fit space-y-6">
                                            <h3 className="font-bold uppercase text-[11px] tracking-widest text-slate-400 flex items-center gap-2"><Icon name="plus-circle" className="w-4 h-4"/> Nuevo Producto</h3>
                                            <input className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent text-sm font-bold focus:border-aroma-100 outline-none transition-all" placeholder="Nombre" value={nuevoProd.name} onChange={e => setNuevoProd({...nuevoProd, name: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <input className="w-full p-5 bg-slate-50 rounded-2xl text-sm font-bold outline-none" placeholder="Precio $" type="number" value={nuevoProd.price} onChange={e => setNuevoProd({...nuevoProd, price: Number(e.target.value)})} />
                                                <input className="w-full p-5 bg-slate-50 rounded-2xl text-sm font-bold outline-none" placeholder="Stock" type="number" value={nuevoProd.stock} onChange={e => setNuevoProd({...nuevoProd, stock: Number(e.target.value)})} />
                                            </div>
                                            <textarea className="w-full p-5 bg-slate-50 rounded-2xl text-sm font-bold h-28 outline-none" placeholder="Descripción breve..." value={nuevoProd.description} onChange={e => setNuevoProd({...nuevoProd, description: e.target.value})}></textarea>
                                            <button onClick={() => { 
                                                if(!nuevoProd.name) return;
                                                setProductos([...productos, {...nuevoProd, id: Date.now(), image: 'https://images.unsplash.com/photo-1595981267035-7b04ca84a82d?w=500'}]); 
                                                setNuevoProd({name: '', price: '', stock: '', description: '', image: ''});
                                                mostrarNotificacion("Producto agregado");
                                            }} className="w-full bg-aroma-500 text-white py-5 rounded-2xl font-bold uppercase text-[11px] tracking-widest shadow-xl shadow-aroma-100 hover:bg-aroma-600 transition-all">Guardar Producto</button>
                                        </div>
                                        
                                        <div className="lg:col-span-8 space-y-4 max-h-[700px] overflow-y-auto custom-scrollbar pr-4">
                                            {productos.map(p => (
                                                <div key={p.id} className="bg-white p-6 rounded-[2.5rem] border border-slate-50 flex items-center justify-between shadow-sm group">
                                                    <div className="flex items-center gap-6">
                                                        <div className="w-16 h-16 rounded-2xl overflow-hidden bg-slate-50 border border-slate-100">
                                                            <img src={p.image} className="w-full h-full object-cover" />
                                                        </div>
                                                        <div>
                                                            <h4 className="font-bold text-aroma-800 text-base">{p.name}</h4>
                                                            <div className="flex items-center gap-4 mt-1">
                                                                <span className="text-[11px] font-bold text-aroma-500">{formatearPrecio(p.price)}</span>
                                                                <span className="text-[11px] font-bold text-slate-300">Stock: {p.stock} u.</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => setProductos(productos.filter(x => x.id !== p.id))} className="text-slate-100 hover:text-rose-500 p-4 transition-colors"><Icon name="trash-2" /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
                                        <div className="lg:col-span-4 bg-white p-10 rounded-[3.5rem] border border-aroma-50 shadow-sm h-fit space-y-6">
                                            <h3 className="font-bold uppercase text-[11px] tracking-widest text-slate-400">Nuevo Mayorista</h3>
                                            <input className="w-full p-5 bg-slate-50 rounded-2xl text-sm font-bold outline-none" placeholder="Nombre completo" value={nuevoUser.nombre} onChange={e => setNuevoUser({...nuevoUser, nombre: e.target.value})} />
                                            <input className="w-full p-5 bg-slate-50 rounded-2xl text-sm font-bold outline-none" placeholder="Email" type="email" value={nuevoUser.email} onChange={e => setNuevoUser({...nuevoUser, email: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-bold uppercase text-slate-300 ml-2">Min. Unidades</label>
                                                    <input className="w-full p-5 bg-slate-50 rounded-2xl text-sm font-bold outline-none" type="number" value={nuevoUser.minCant} onChange={e => setNuevoUser({...nuevoUser, minCant: Number(e.target.value)})} />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-bold uppercase text-slate-300 ml-2">% Descuento</label>
                                                    <input className="w-full p-5 bg-slate-50 rounded-2xl text-sm font-bold outline-none" type="number" value={nuevoUser.porcentaje} onChange={e => setNuevoUser({...nuevoUser, porcentaje: Number(e.target.value)})} />
                                                </div>
                                            </div>
                                            <button onClick={() => {
                                                if(!nuevoUser.email || !nuevoUser.nombre) return;
                                                setUsuarios([...usuarios, { id: Date.now(), ...nuevoUser, descuento: { cantidadMinima: nuevoUser.minCant, porcentaje: nuevoUser.porcentaje } }]);
                                                setNuevoUser({ nombre: '', email: '', minCant: 5, porcentaje: 15 });
                                                mostrarNotificacion("Mayorista registrado");
                                            }} className="w-full bg-aroma-500 text-white py-5 rounded-2xl font-bold uppercase text-[11px] tracking-widest shadow-xl">Dar de Alta</button>
                                        </div>
                                        <div className="lg:col-span-8 space-y-4">
                                            {usuarios.map(u => (
                                                <div key={u.id} className="bg-white p-8 rounded-[3rem] border border-slate-50 flex justify-between items-center shadow-sm">
                                                    <div>
                                                        <p className="font-extrabold text-aroma-800 text-lg">{u.nombre}</p>
                                                        <p className="text-[11px] text-slate-400 font-bold uppercase mt-1 tracking-wider">{u.email}</p>
                                                    </div>
                                                    <div className="flex items-center gap-10">
                                                        <div className="text-right">
                                                            <span className="block text-xl font-black text-aroma-500">{u.descuento.porcentaje}% OFF</span>
                                                            <span className="block text-[10px] font-bold text-slate-300 uppercase mt-0.5">Mín: {u.descuento.cantidadMinima} u.</span>
                                                        </div>
                                                        <button onClick={() => setUsuarios(usuarios.filter(x => x.id !== u.id))} className="text-slate-100 hover:text-rose-400 p-3 transition-colors"><Icon name="user-x" /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Login Cliente Mayorista */}
                        {vistaActual === 'login' && (
                            <div className="max-w-md mx-auto mt-20 animate-in text-center">
                                <div className="bg-white p-14 rounded-[4rem] shadow-2xl border border-aroma-50">
                                    <div className="w-28 h-28 bg-white rounded-[2rem] flex items-center justify-center mx-auto mb-12 border border-aroma-50 shadow-inner p-3 relative">
                                        <div className="absolute inset-0 bg-aroma-50/30 rounded-[2rem] blur-xl"></div>
                                        <img src={LOGO_URL} alt="San Martin" className="relative w-full h-full object-contain" />
                                    </div>
                                    <h2 className="text-4xl font-extrabold text-aroma-800 mb-4 tracking-tighter">Acceso Mayorista</h2>
                                    <p className="text-slate-400 text-sm mb-12 font-medium leading-relaxed">Ingresa con tu correo registrado para visualizar tus beneficios exclusivos.</p>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        const user = usuarios.find(u => u.email.toLowerCase() === emailLogin.toLowerCase());
                                        if(user) { 
                                            setUsuarioLogueado(user); 
                                            setVistaActual('inicio'); 
                                            mostrarNotificacion(`Bienvenido, ${user.nombre}`); 
                                        } else { mostrarNotificacion("Email no registrado", "error"); }
                                    }} className="space-y-8">
                                        <input type="email" value={emailLogin} onChange={e => setEmailLogin(e.target.value)} className="w-full bg-slate-50 p-6 rounded-[2rem] border-2 border-transparent font-bold text-center outline-none focus:border-aroma-100 transition-all text-aroma-800" placeholder="Email" required />
                                        <button type="submit" className="w-full bg-aroma-500 text-white py-6 rounded-[2rem] font-bold uppercase text-[11px] tracking-[0.3em] shadow-2xl shadow-aroma-100 hover:bg-aroma-600 transition-all active:scale-95">Ingresar</button>
                                    </form>
                                    <p className="mt-12 text-[10px] text-slate-300 font-bold uppercase tracking-widest leading-loose">¿Todavía no eres cliente mayorista? <br/> Contáctanos para solicitar el alta.</p>
                                </div>
                            </div>
                        )}

                        {/* Carrito de Compras */}
                        {vistaActual === 'carrito' && (
                            <div className="animate-in max-w-3xl mx-auto space-y-12 pb-32">
                                <div className="text-center">
                                    <h2 className="text-5xl font-extrabold text-aroma-800 tracking-tighter">Mi Pedido</h2>
                                    <p className="text-slate-400 text-[11px] font-bold uppercase tracking-[0.4em] mt-4">Resumen de selección</p>
                                </div>
                                <div className="bg-white p-12 rounded-[4rem] shadow-2xl border border-slate-50">
                                    {carrito.length === 0 ? (
                                        <div className="text-center py-24">
                                            <div className="bg-slate-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 text-slate-200">
                                                <Icon name="shopping-cart" className="w-12 h-12" />
                                            </div>
                                            <p className="text-slate-400 font-bold uppercase tracking-widest text-xs">El carrito está vacío</p>
                                            <button onClick={() => setVistaActual('inicio')} className="mt-8 text-aroma-500 font-bold text-[12px] uppercase tracking-widest border-b-2 border-aroma-100 pb-1">Volver a la Tienda</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-12">
                                            <div className="space-y-8 max-h-[500px] overflow-y-auto pr-6 custom-scrollbar">
                                                {carrito.map((item, i) => (
                                                    <div key={i} className="flex items-center gap-8 py-4 group animate-in">
                                                        <div className="w-20 h-20 rounded-3xl overflow-hidden bg-slate-50 border border-slate-100 shrink-0">
                                                            <img src={item.image} className="w-full h-full object-cover" />
                                                        </div>
                                                        <div className="flex-grow">
                                                            <p className="font-extrabold text-aroma-800 text-lg">{item.name}</p>
                                                            <p className="text-[12px] font-bold text-slate-400 mt-1 uppercase tracking-tighter">{formatearPrecio(item.price)} × {item.cantidad} u.</p>
                                                        </div>
                                                        <button onClick={() => setCarrito(carrito.filter((_, idx) => idx !== i))} className="text-slate-100 hover:text-rose-500 p-4 transition-colors"><Icon name="x" /></button>
                                                    </div>
                                                ))}
                                            </div>
                                            
                                            <div className="pt-12 border-t border-slate-50 space-y-6">
                                                <div className="flex justify-between text-xs font-bold text-slate-300 uppercase tracking-[0.2em]">
                                                    <span>Subtotal</span>
                                                    <span>{formatearPrecio(subtotal)}</span>
                                                </div>
                                                {descuentoAplicado > 0 && (
                                                    <div className="flex justify-between text-[11px] font-bold text-aroma-500 uppercase tracking-widest bg-aroma-50 p-6 rounded-3xl border border-aroma-100 italic">
                                                        <div className="flex items-center gap-3">
                                                            <Icon name="sparkles" className="w-5 h-5" />
                                                            <span>Descuento Mayorista ({usuarioLogueado.descuento.porcentaje}%)</span>
                                                        </div>
                                                        <span className="font-black">-{formatearPrecio(descuentoAplicado)}</span>
                                                    </div>
                                                )}
                                                <div className="flex justify-between items-end pt-8">
                                                    <div>
                                                        <span className="text-slate-300 font-bold uppercase text-[11px] tracking-widest block mb-2">Total estimado</span>
                                                        <span className="text-5xl font-extrabold text-aroma-800 leading-none tracking-tighter italic font-serif">{formatearPrecio(totalFinal)}</span>
                                                    </div>
                                                    <div className="text-right">
                                                        <span className="bg-aroma-500 text-white px-5 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-lg shadow-aroma-50">{totalUnidades} Unidades</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <button onClick={procesarCompraFinal} disabled={procesando} className="w-full bg-aroma-500 text-white py-7 rounded-[2.5rem] font-bold uppercase text-xs tracking-[0.4em] flex items-center justify-center gap-6 shadow-2xl shadow-aroma-100 hover:bg-aroma-600 transition-all hover:-translate-y-1 active:translate-y-0 group">
                                                {procesando ? <div className="loader"></div> : <Icon name="send" className="w-5 h-5 group-hover:rotate-12 transition-transform" />}
                                                Finalizar por WhatsApp
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Perfil del Cliente */}
                        {vistaActual === 'perfil' && usuarioLogueado && (
                            <div className="max-w-md mx-auto animate-in mt-10">
                                <div className="bg-white p-14 rounded-[4rem] text-center shadow-2xl border border-slate-50 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-aroma-50 rounded-full -mr-16 -mt-16 opacity-50"></div>
                                    <div className="w-32 h-32 bg-white rounded-3xl flex items-center justify-center mx-auto mb-10 border border-slate-100 shadow-xl p-4 relative z-10">
                                        <img src={LOGO_URL} className="w-full h-full object-contain" />
                                    </div>
                                    <h2 className="text-3xl font-extrabold text-aroma-800 tracking-tighter relative z-10">{usuarioLogueado.nombre}</h2>
                                    <p className="text-aroma-400 text-xs font-bold uppercase tracking-[0.3em] mt-3">{usuarioLogueado.email}</p>
                                    
                                    <div className="mt-12 bg-aroma-50/50 p-10 rounded-[3rem] border border-aroma-100 shadow-inner">
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em] mb-4">Beneficio Actual</p>
                                        <div className="flex justify-center items-center gap-5">
                                            <span className="text-7xl font-black text-aroma-500 leading-none italic font-serif">{usuarioLogueado.descuento.porcentaje}%</span>
                                            <div className="text-left">
                                                <span className="block text-aroma-800 font-extrabold text-2xl leading-none">OFF</span>
                                            </div>
                                        </div>
                                        <div className="mt-10 pt-8 border-t border-aroma-100/30">
                                            <p className="text-[11px] text-slate-400 font-medium leading-relaxed italic">Válido en compras de {usuarioLogueado.descuento.cantidadMinima} unidades o más.</p>
                                        </div>
                                    </div>
                                    
                                    <button onClick={() => { setUsuarioLogueado(null); setVistaActual('inicio'); }} className="mt-14 text-slate-300 hover:text-rose-400 font-bold text-[11px] uppercase tracking-[0.4em] transition-colors flex items-center justify-center gap-3 mx-auto">
                                        <Icon name="log-out" className="w-4 h-4" />
                                        Cerrar Sesión
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer Estilo Boutique */}
                    <footer className="py-20 px-6 text-center border-t border-slate-50 bg-white mt-20">
                        <div className="flex justify-center mb-10">
                             <img src={LOGO_URL} className="w-20 h-20 grayscale opacity-20 hover:opacity-100 transition-all duration-700 hover:grayscale-0" />
                        </div>
                        <div className="space-y-4">
                            <p className="text-[13px] font-extrabold text-aroma-800 uppercase tracking-[0.6em]">San Martín Aromas</p>
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] max-w-xs mx-auto leading-loose italic">Esencias que cuentan historias. <br/>Mendoza, Argentina.</p>
                            <div className="flex justify-center gap-8 pt-10">
                                <a href="#" className="text-slate-200 hover:text-aroma-400 transition-colors"><Icon name="instagram" className="w-6 h-6"/></a>
                                <a href="#" className="text-slate-200 hover:text-aroma-400 transition-colors"><Icon name="facebook" className="w-6 h-6"/></a>
                            </div>
                        </div>
                        <p className="text-[9px] text-slate-200 font-bold uppercase tracking-[0.5em] mt-20">© 2024 San Martín Aromas - Boutique Collection</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
