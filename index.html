<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>San Martin Aromas - Sistema Integral</title>
    <!-- Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS para Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        aroma: { 500: '#3e8e89', 400: '#58aaa5', 600: '#31726f', 50: '#f0f9f9' }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #fafcfc; color: #264b4a; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px -15px rgba(88, 170, 165, 0.2); }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #3e8e89; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LOGO_URL = "https://lh3.googleusercontent.com/d/14d7ZtlSz-x6WwwDtHf6ks_nVCxYstwd1";
        const CLAVE_ADMIN = "Hola4088";
        const WHATSAPP = "5492634733777";
        const IMG_DEFAULT = "https://images.unsplash.com/photo-1602928321679-560bb453f190?w=500";
        
        // ID DE FORMSPREE ACTUALIZADO
        const FORMSPREE_ID = "xgopdoap"; 

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    iconElement.className = className;
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons();
                }
            }, [name, className]);
            return <div ref={iconRef} className="inline-flex items-center justify-center pointer-events-none" />;
        };

        function App() {
            const [vista, setVista] = useState('inicio');
            const [tabAdmin, setTabAdmin] = useState('productos');
            const [cargandoEnvio, setCargandoEnvio] = useState(false);
            
            const [productos, setProductos] = useState([
                { id: 1, name: "Difusor Premium", price: 4500, stock: 20, image: "https://images.unsplash.com/photo-1602928321679-560bb453f190?w=500", description: "Esencias seleccionadas de alta calidad para ambientes sofisticados." },
                { id: 2, name: "Vela Aromática Soja", price: 3200, stock: 15, image: "https://images.unsplash.com/photo-1603006905393-d90069279093?w=500", description: "Velas 100% ecológicas con aceites esenciales naturales." }
            ]);
            const [usuarios, setUsuarios] = useState([
                { id: "u1", nombre: "Distribuidora Mendoza", email: "mayorista@test.com", descuento: { cantidadMinima: 10, porcentaje: 20 } }
            ]);

            const [carrito, setCarrito] = useState([]);
            const [user, setUser] = useState(null);
            const [notif, setNotif] = useState(null);
            const [adminAuth, setAdminAuth] = useState(false);
            const [passInput, setPassInput] = useState("");
            const [showAdminLogin, setShowAdminLogin] = useState(false);

            const showMsg = (m, t = 'success') => { setNotif({ m, t }); setTimeout(() => setNotif(null), 3000); };
            const formatPrice = (p) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(p);

            // --- EXCEL PRODUCTOS ---
            const handleImportProductos = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    const nuevos = data.map((item, index) => ({
                        id: Date.now() + index,
                        name: item.Nombre || "Sin Nombre",
                        price: Number(item.Precio) || 0,
                        stock: Number(item.Stock) || 0,
                        description: item.Descripcion || "",
                        image: item.Imagen || IMG_DEFAULT
                    }));
                    setProductos([...productos, ...nuevos]);
                    showMsg(`Importados ${nuevos.length} productos`);
                };
                reader.readAsBinaryString(file);
            };

            const handleExportProductos = () => {
                const ws = XLSX.utils.json_to_sheet(productos.map(p => ({
                    Nombre: p.name, Precio: p.price, Stock: p.stock, Descripcion: p.description, Imagen: p.image
                })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Productos");
                XLSX.writeFile(wb, "inventario_san_martin.xlsx");
            };

            // --- EXCEL USUARIOS ---
            const handleImportUsuarios = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    const nuevos = data.map((item, index) => ({
                        id: "u" + (Date.now() + index),
                        nombre: item.Nombre || "Usuario",
                        email: String(item.Email).toLowerCase(),
                        descuento: { 
                            cantidadMinima: Number(item.Minimo) || 1, 
                            porcentaje: Number(item.Descuento) || 0 
                        }
                    }));
                    setUsuarios([...usuarios, ...nuevos]);
                    showMsg(`Importados ${nuevos.length} usuarios`);
                };
                reader.readAsBinaryString(file);
            };

            // Lógica Carrito
            const totalItems = carrito.reduce((t, i) => t + i.cantidad, 0);
            const subtotal = carrito.reduce((t, i) => t + (i.price * i.cantidad), 0);
            let descVal = (user?.descuento && totalItems >= user.descuento.cantidadMinima) ? subtotal * (user.descuento.porcentaje / 100) : 0;
            const total = subtotal - descVal;

            const finalizarPedidoTotal = async () => {
                if(!user) {
                    showMsg("Debes ingresar como mayorista", "error");
                    setVista('login');
                    return;
                }

                setCargandoEnvio(true);
                
                // 1. Preparar texto para WhatsApp
                let msgWhatsApp = `🌿 *PEDIDO SAN MARTIN*\n👤 *Cliente:* ${user.nombre}\n📧 *Email:* ${user.email}\n---\n`;
                const detalleTexto = carrito.map(i => `• ${i.name} (x${i.cantidad}) - ${formatPrice(i.price * i.cantidad)}`).join('\n');
                msgWhatsApp += detalleTexto;
                msgWhatsApp += `\n---\n*TOTAL: ${formatPrice(total)}*`;

                // 2. Enviar a Formspree (Respaldo en Mail y BD de Formspree)
                try {
                    const response = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({
                            cliente: user.nombre,
                            email: user.email,
                            pedido: detalleTexto,
                            total_pedido: formatPrice(total),
                            items_totales: totalItems,
                            descuento_aplicado: formatPrice(descVal),
                            _subject: `Nuevo Pedido Mayorista: ${user.nombre}`
                        })
                    });
                    if (!response.ok) throw new Error("Error en Formspree");
                } catch (error) {
                    console.error("Error al enviar a Formspree:", error);
                }

                // 3. Abrir WhatsApp (Acción inmediata)
                window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msgWhatsApp)}`, '_blank');
                
                // 4. Limpiar y resetear
                setCarrito([]);
                setVista('inicio');
                setCargandoEnvio(false);
                showMsg("Pedido confirmado y enviado");
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="glass-header border-b sticky top-0 z-50 p-4">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4 cursor-pointer group" onClick={() => setShowAdminLogin(true)}>
                                <div className="relative">
                                    <img src={LOGO_URL} className="w-12 h-12 object-contain group-hover:scale-110 transition-transform" />
                                    <div className="absolute -inset-1 bg-aroma-400/20 rounded-full blur opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                </div>
                                <h1 className="hidden sm:block font-extrabold text-aroma-600 uppercase tracking-tighter">San Martín <span className="block text-[8px] tracking-[.3em] uppercase opacity-40 text-slate-500 font-normal">Aromas & Fragancias</span></h1>
                            </div>
                            <nav className="flex gap-6 items-center">
                                <button onClick={() => setVista('inicio')} className="text-xs font-black uppercase tracking-widest text-slate-400 hover:text-aroma-500 transition-colors">Catálogo</button>
                                <button onClick={() => setVista('carrito')} className="relative p-2 text-slate-400 hover:text-aroma-500 transition-colors">
                                    <Icon name="shopping-bag" />
                                    {carrito.length > 0 && <span className="absolute -top-1 -right-1 bg-aroma-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold shadow-lg shadow-aroma-200">{carrito.length}</span>}
                                </button>
                                {user ? (
                                    <div className="flex items-center gap-3">
                                        <div className="flex flex-col items-end">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Mayorista</span>
                                            <span className="text-xs font-black text-aroma-600">{user.nombre.split(' ')[0]}</span>
                                        </div>
                                        <button onClick={() => {setUser(null); setVista('inicio');}} className="text-slate-300 hover:text-red-400 transition-colors"><Icon name="log-out" className="w-4 h-4"/></button>
                                    </div>
                                ) : (
                                    <button onClick={() => setVista('login')} className="bg-aroma-500 text-white px-6 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-aroma-600 transition-all shadow-xl shadow-aroma-100">Ingresar</button>
                                )}
                            </nav>
                        </div>
                    </header>

                    {notif && (
                        <div className={`fixed bottom-5 left-1/2 -translate-x-1/2 z-[100] px-8 py-4 rounded-2xl shadow-2xl text-white text-sm font-bold animate-in flex items-center gap-3 ${notif.t === 'error' ? 'bg-red-500' : 'bg-aroma-600'}`}>
                            <Icon name={notif.t === 'error' ? 'alert-circle' : 'check-circle'} />
                            {notif.m}
                        </div>
                    )}

                    <main className="flex-grow p-6 max-w-6xl mx-auto w-full">
                        {vista === 'inicio' && (
                            <div className="animate-in space-y-12">
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
                                    {productos.map(p => (
                                        <div key={p.id} className="product-card bg-white rounded-[2.5rem] p-6 border border-slate-100 shadow-sm transition-all group">
                                            <div className="aspect-square rounded-3xl overflow-hidden mb-6 bg-slate-50 relative">
                                                <img src={p.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                            </div>
                                            <h3 className="font-bold text-lg mb-2 text-slate-800">{p.name}</h3>
                                            <p className="text-xs text-slate-400 line-clamp-2 mb-4 leading-relaxed">{p.description}</p>
                                            <div className="flex justify-between items-center mt-4 pt-4 border-t border-slate-50">
                                                <span className="text-xl font-black text-aroma-600 italic">{formatPrice(p.price)}</span>
                                                <button onClick={() => { setCarrito([...carrito, {...p, cantidad: 1}]); showMsg("Producto añadido"); }} className="bg-aroma-50 text-aroma-500 p-3 rounded-xl hover:bg-aroma-500 hover:text-white transition-all transform active:scale-95"><Icon name="plus" /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {vista === 'admin' && adminAuth && (
                            <div className="animate-in space-y-8 pb-20">
                                <div className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm">
                                    <div className="flex flex-wrap gap-4 justify-between items-center mb-8">
                                        <div>
                                            <h2 className="text-3xl font-black italic font-serif text-slate-800 tracking-tight">Consola Central</h2>
                                            <div className="flex gap-4 mt-2">
                                                <button onClick={() => setTabAdmin('productos')} className={`text-[10px] font-black uppercase tracking-widest pb-1 border-b-2 transition-all ${tabAdmin === 'productos' ? 'border-aroma-500 text-aroma-600' : 'border-transparent text-slate-300'}`}>Inventario</button>
                                                <button onClick={() => setTabAdmin('usuarios')} className={`text-[10px] font-black uppercase tracking-widest pb-1 border-b-2 transition-all ${tabAdmin === 'usuarios' ? 'border-aroma-500 text-aroma-600' : 'border-transparent text-slate-300'}`}>Clientes</button>
                                            </div>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            <button onClick={handleExportProductos} className="bg-slate-50 text-slate-500 px-5 py-3 rounded-2xl text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-slate-100 transition-all">
                                                <Icon name="download" className="w-4 h-4" /> Exportar
                                            </button>
                                            <label className="bg-aroma-600 text-white px-5 py-3 rounded-2xl text-[10px] font-bold uppercase tracking-widest cursor-pointer shadow-lg shadow-aroma-100 flex items-center gap-2 hover:bg-aroma-700 transition-all">
                                                <Icon name="upload" className="w-4 h-4" /> Cargar Excel
                                                <input type="file" accept=".xlsx, .xls" onChange={tabAdmin === 'productos' ? handleImportProductos : handleImportUsuarios} className="hidden" />
                                            </label>
                                        </div>
                                    </div>
                                    
                                    <div className="overflow-x-auto rounded-3xl border border-slate-50">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 text-[10px] uppercase font-black text-slate-400 tracking-widest">
                                                <tr>
                                                    <th className="p-4">Identificador</th>
                                                    <th className="p-4">Información</th>
                                                    <th className="p-4">Valor</th>
                                                    <th className="p-4 text-right">Acción</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {(tabAdmin === 'productos' ? productos : usuarios).map((item, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-4 font-mono text-[10px] text-slate-300">#{item.id}</td>
                                                        <td className="p-4 font-bold text-slate-700">{item.name || item.nombre}</td>
                                                        <td className="p-4 font-black text-aroma-600">{tabAdmin === 'productos' ? formatPrice(item.price) : `${item.descuento.porcentaje}% Desc.`}</td>
                                                        <td className="p-4 text-right">
                                                            <button className="text-slate-200 hover:text-red-400 transition-colors"><Icon name="trash-2" className="w-4 h-4"/></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {vista === 'login' && (
                            <div className="max-w-sm mx-auto mt-20 animate-in">
                                <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-50 text-center relative">
                                    <div className="absolute -top-12 left-1/2 -translate-x-1/2 w-24 h-24 bg-white rounded-full p-4 shadow-xl border border-slate-50">
                                        <img src={LOGO_URL} className="w-full h-full object-contain" />
                                    </div>
                                    <h2 className="text-2xl font-black mt-8 mb-2">Portal Mayorista</h2>
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8">Ingresa tu correo habilitado</p>
                                    <input type="email" id="emailLogin" className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-center outline-none border-2 border-transparent focus:border-aroma-200 mb-4 transition-all" placeholder="ejemplo@correo.com" />
                                    <button onClick={() => {
                                        const email = document.getElementById('emailLogin').value;
                                        const found = usuarios.find(u => u.email.toLowerCase() === email.toLowerCase());
                                        if(found) { setUser(found); setVista('inicio'); showMsg(`Bienvenido, ${found.nombre}`); }
                                        else showMsg("Email no registrado como mayorista", "error");
                                    }} className="w-full bg-aroma-500 text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-xl shadow-aroma-100 hover:bg-aroma-600 transition-all transform active:scale-95">Acceder al Catálogo</button>
                                </div>
                            </div>
                        )}

                        {vista === 'carrito' && (
                            <div className="max-w-2xl mx-auto animate-in space-y-8">
                                <h2 className="text-4xl font-black italic font-serif text-center text-slate-800">Tu Pedido</h2>
                                <div className="bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-50 relative overflow-hidden">
                                    {carrito.length === 0 ? (
                                        <div className="text-center py-20">
                                            <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                                <Icon name="shopping-cart" className="w-10 h-10 text-slate-200" />
                                            </div>
                                            <p className="text-slate-300 font-bold uppercase tracking-widest text-[10px]">El carrito está vacío</p>
                                            <button onClick={() => setVista('inicio')} className="mt-6 text-aroma-500 font-bold text-xs underline decoration-aroma-200 underline-offset-4">Explorar fragancias</button>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            {carrito.map((item, i) => (
                                                <div key={i} className="flex justify-between items-center border-b pb-4 border-slate-50">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-14 h-14 rounded-2xl bg-slate-50 overflow-hidden shadow-sm border border-slate-100"><img src={item.image} className="w-full h-full object-cover"/></div>
                                                        <div>
                                                            <p className="font-bold text-slate-700 text-sm">{item.name}</p>
                                                            <p className="text-[10px] text-slate-400 font-black tracking-tight">{formatPrice(item.price)} x {item.cantidad}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <span className="font-black text-slate-800 text-sm">{formatPrice(item.price * item.cantidad)}</span>
                                                        <button onClick={() => setCarrito(carrito.filter((_, idx) => idx !== i))} className="text-slate-200 hover:text-red-400 transition-colors p-2"><Icon name="trash" className="w-4 h-4"/></button>
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            <div className="pt-8 mt-8 border-t-2 border-slate-50 space-y-4">
                                                <div className="flex justify-between text-xs font-bold text-slate-400">
                                                    <span>Subtotal</span>
                                                    <span>{formatPrice(subtotal)}</span>
                                                </div>
                                                
                                                {descVal > 0 && (
                                                    <div className="flex justify-between text-aroma-600 font-black text-xs bg-aroma-50 p-4 rounded-2xl border border-aroma-100 animate-in">
                                                        <div className="flex items-center gap-2">
                                                            <div className="w-6 h-6 bg-aroma-500 text-white rounded-full flex items-center justify-center text-[10px]"><Icon name="percent" className="w-3 h-3"/></div>
                                                            Descuento Mayorista ({user.descuento.porcentaje}%)
                                                        </div>
                                                        <span>-{formatPrice(descVal)}</span>
                                                    </div>
                                                )}

                                                <div className="flex justify-between items-end pt-4">
                                                    <div>
                                                        <span className="block text-[9px] text-slate-400 uppercase font-black tracking-widest mb-1">Total a confirmar</span>
                                                        <span className="text-4xl font-black text-aroma-700 italic font-serif leading-none tracking-tighter">{formatPrice(total)}</span>
                                                    </div>
                                                    <button 
                                                        onClick={finalizarPedidoTotal} 
                                                        disabled={cargandoEnvio}
                                                        className={`bg-green-500 text-white px-10 py-5 rounded-[2rem] font-black uppercase text-[10px] tracking-[.2em] flex items-center gap-3 transition-all shadow-xl shadow-green-100 hover:-translate-y-1 ${cargandoEnvio ? 'opacity-50 cursor-not-allowed' : 'hover:bg-green-600 active:scale-95'}`}>
                                                        {cargandoEnvio ? <Icon name="loader" className="animate-spin w-4 h-4" /> : <Icon name="check-circle" className="w-4 h-4" />} 
                                                        {cargandoEnvio ? 'Procesando...' : 'Confirmar Pedido'}
                                                    </button>
                                                </div>
                                                <p className="text-[9px] text-slate-300 text-center uppercase tracking-widest font-bold">Se enviará el detalle por email y WhatsApp</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal Login Admin */}
                    {showAdminLogin && !adminAuth && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-xs shadow-2xl animate-in text-center border-b-8 border-aroma-500 relative">
                                <div className="w-16 h-16 bg-aroma-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                    <Icon name="lock" className="w-8 h-8 text-aroma-500" />
                                </div>
                                <h2 className="font-black mb-6 uppercase text-[10px] tracking-[.3em] text-slate-400">Acceso Restringido</h2>
                                <input type="password" value={passInput} onChange={e => setPassInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && document.getElementById('btnEnter').click()} className="w-full bg-slate-50 p-4 rounded-2xl text-center mb-6 font-bold outline-none border-2 border-transparent focus:border-aroma-200 transition-all" placeholder="Contraseña Admin" autoFocus />
                                <div className="flex gap-3">
                                    <button onClick={() => {setShowAdminLogin(false); setPassInput("");}} className="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-300 hover:text-slate-500 transition-colors">Cancelar</button>
                                    <button id="btnEnter" onClick={() => {
                                        if(passInput === CLAVE_ADMIN) { setAdminAuth(true); setShowAdminLogin(false); setVista('admin'); setPassInput(""); }
                                        else showMsg("Clave incorrecta", "error");
                                    }} className="flex-1 bg-aroma-600 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-aroma-100 hover:bg-aroma-700 transition-all">Validar</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <footer className="p-12 text-center mt-12">
                        <div className="flex items-center justify-center gap-2 mb-4 opacity-20">
                            <div className="h-[1px] w-12 bg-slate-400"></div>
                            <img src={LOGO_URL} className="w-6 h-6 grayscale" />
                            <div className="h-[1px] w-12 bg-slate-400"></div>
                        </div>
                        <p className="text-[10px] font-black uppercase tracking-[.5em] text-slate-300">San Martín Aromas • Gestión de Ventas v2.5</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
