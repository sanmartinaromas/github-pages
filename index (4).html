<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo · Escuela e Instituciones</title>
<style>
  :root{
    --ink:#16233a;
    --paper:#eef3f9;
    --card:#ffffff;
    --line:#d3ddea;
    --accent:#1a4f8b;
    --accent-soft:#dbe8f7;
    --mut:#6b7280;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Segoe UI', Roboto, Arial, sans-serif; background:var(--paper); color:var(--ink); padding-bottom:90px; }
  header{ background:var(--ink); color:#fff; padding:18px 16px 14px; position:sticky; top:0; z-index:20; }
  header h1{ margin:0; font-size:19px; font-weight:700; }
  header .tag{ font-size:11.5px; opacity:.7; display:block; margin-top:3px;}
  .search-wrap{ padding:14px 16px 0; }
  #search{ width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--line); font-size:14px; background:var(--card); }
  main{ padding:8px 16px 20px; max-width:760px; margin:0 auto; }
  .grupo-title{ font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--mut); margin:22px 0 6px; font-weight:700; }
  .rubro{ margin-top:14px; }
  .rubro-h{ background:var(--accent-soft); color:var(--ink); padding:7px 10px; border-radius:8px; font-size:13.5px; font-weight:700; margin-bottom:6px; }
  .prod{ display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:9px 10px; margin-bottom:6px; }
  .prod-name{ font-size:13.5px; line-height:1.25; }
  .prod-price{ font-size:13.5px; font-weight:700; color:var(--accent); white-space:nowrap; margin-top:2px; display:block;}
  .prod-right{ display:flex; align-items:center; gap:8px; }
  .qty-btn{ width:26px; height:26px; border-radius:50%; border:1px solid var(--line); background:#fff; font-size:15px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .qty-val{ min-width:18px; text-align:center; font-size:13px; font-weight:600;}
  .add-btn{ background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 12px; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .no-results{ text-align:center; color:var(--mut); padding:40px 10px; font-size:13.5px; }
  .cart-bar{ position:fixed; left:0; right:0; bottom:0; z-index:30; background:var(--ink); color:#fff; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 -4px 14px rgba(0,0,0,.18); }
  .cart-bar .info{ font-size:13px; } .cart-bar .info b{ font-size:15px; }
  .cart-bar button{ background:var(--accent); color:#fff; border:none; border-radius:9px; padding:10px 16px; font-size:13.5px; font-weight:700; cursor:pointer; }
  .modal-bg{ position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:40; display:none; align-items:flex-end; justify-content:center; }
  .modal-bg.open{ display:flex; }
  .modal{ background:#fff; width:100%; max-width:760px; border-radius:16px 16px 0 0; max-height:82vh; overflow-y:auto; padding:18px 16px 20px; }
  .modal h2{ margin:0 0 10px; font-size:17px; }
  .cart-row{ display:flex; justify-content:space-between; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); }
  .cart-row .nm{ font-size:13px; } .cart-row .sub{ font-size:12px; color:var(--mut); }
  .cart-row .rm{ background:none; border:none; color:#b3261e; font-size:12px; cursor:pointer; padding:4px; }
  .cart-total{ display:flex; justify-content:space-between; font-size:16px; font-weight:700; margin:14px 0 10px; }
  .whatsapp-btn{ display:block; width:100%; text-align:center; text-decoration:none; background:#25D366; color:#fff; padding:13px; border-radius:10px; font-weight:700; font-size:14.5px; }
  .close-modal{ background:none; border:1px solid var(--line); border-radius:8px; padding:7px 12px; font-size:12.5px; cursor:pointer; float:right; }
  .empty-cart{ color:var(--mut); font-size:13.5px; text-align:center; padding:20px 0; }
</style>
</head>

function fmt(n){ return "$" + Math.round(n).toLocaleString("es-AR"); }
function priceFor(p){ return p.precio * MULT; }

function groupProducts(list){
  const groups = {};
  list.forEach(p=>{
    if(!groups[p.grupo]) groups[p.grupo] = {};
    if(!groups[p.grupo][p.rubro]) groups[p.grupo][p.rubro] = [];
    groups[p.grupo][p.rubro].push(p);
  });
  return groups;
}

function renderCatalogo(){
  const q = document.getElementById("search").value.trim().toLowerCase();
  const filtered = PRODUCTS.filter(p => p.nombre.toLowerCase().includes(q));
  const cont = document.getElementById("catalogo");
  cont.innerHTML = "";
  if(filtered.length===0){
    cont.innerHTML = "<div class='no-results'>No encontramos productos con ese nombre.</div>";
    return;
  }
  const groups = groupProducts(filtered);
  Object.keys(groups).forEach(grupo=>{
    const gTitle = document.createElement("div");
    gTitle.className = "grupo-title";
    gTitle.textContent = grupo;
    cont.appendChild(gTitle);
    const rubros = groups[grupo];
    Object.keys(rubros).forEach(rubro=>{
      const rDiv = document.createElement("div");
      rDiv.className = "rubro";
      const rH = document.createElement("div");
      rH.className = "rubro-h";
      rH.textContent = rubro;
      rDiv.appendChild(rH);
      rubros[rubro].forEach(p=>{ rDiv.appendChild(renderProductRow(p)); });
      cont.appendChild(rDiv);
    });
  });
}

function renderProductRow(p){
  const row = document.createElement("div");
  row.className = "prod";
  const qty = cart[p.id] || 0;

  const left = document.createElement("div");
  left.innerHTML = "<div class='prod-name'>"+p.nombre+"</div><span class='prod-price'>"+fmt(priceFor(p))+"</span>";

  const right = document.createElement("div");
  right.className = "prod-right";
  if(qty > 0){
    const minus = document.createElement("button");
    minus.className = "qty-btn"; minus.textContent = "–";
    minus.onclick = ()=>{ changeQty(p.id, -1); };
    const val = document.createElement("span");
    val.className = "qty-val"; val.textContent = qty;
    const plus = document.createElement("button");
    plus.className = "qty-btn"; plus.textContent = "+";
    plus.onclick = ()=>{ changeQty(p.id, 1); };
    right.appendChild(minus); right.appendChild(val); right.appendChild(plus);
  } else {
    const add = document.createElement("button");
    add.className = "add-btn"; add.textContent = "Agregar";
    add.onclick = ()=>{ changeQty(p.id, 1); };
    right.appendChild(add);
  }
  row.appendChild(left); row.appendChild(right);
  return row;
}

function changeQty(id, delta){
  const cur = cart[id] || 0;
  const next = Math.max(0, cur + delta);
  if(next === 0) delete cart[id]; else cart[id] = next;
  renderAll();
}

function cartItems(){
  return Object.keys(cart).map(id=>{
    const p = PRODUCTS.find(pp=>pp.id === Number(id));
    return { p, qty: cart[id] };
  });
}
function cartTotal(){ return cartItems().reduce((sum,it)=> sum + priceFor(it.p)*it.qty, 0); }

function renderCartBar(){
  const items = cartItems();
  const count = items.reduce((s,it)=>s+it.qty,0);
  document.getElementById("cartCount").textContent = count;
  document.getElementById("cartTotal").textContent = fmt(cartTotal());
}

      row.className = "cart-row";
      row.innerHTML = "<div><div class='nm'>"+it.p.nombre+"</div><div class='sub'>"+it.qty+" x "+fmt(priceFor(it.p))+"</div></div>"+
        "<div style='display:flex; align-items:center; gap:10px;'><b>"+fmt(priceFor(it.p)*it.qty)+"</b><button class='rm' onclick='removeItem("+it.p.id+")'>Quitar</button></div>";
      list.appendChild(row);
    });
  }
  document.getElementById("modalTotal").textContent = fmt(cartTotal());
  updateWaLink();
}

function removeItem(id){ delete cart[id]; renderAll(); }

function updateWaLink(){
  const items = cartItems();
  let text = "Hola! Quiero hacer un pedido (" + TIER_LABEL + "):%0A%0A";
  items.forEach(it=>{
    text += "• " + it.p.nombre + " x" + it.qty + " - " + fmt(priceFor(it.p)*it.qty) + "%0A";
  });
  text += "%0ATotal: " + fmt(cartTotal());
  document.getElementById("waLink").href = "https://wa.me/"+WHATSAPP_NUMBER+"?text="+text;
}

function openCart(){ renderCartModal(); document.getElementById("modalBg").classList.add("open"); }
function closeCart(){ document.getElementById("modalBg").classList.remove("open"); }

function renderAll(){
  renderCatalogo(); renderCartBar();
  if(document.getElementById("modalBg").classList.contains("open")) renderCartModal();
}

document.getElementById("search").addEventListener("input", renderCatalogo);
renderAll();
</script>
</body>
</html>
